        el("span",{style:{color:"var(--muted)"}},"Citas en total"),
        el("span",{class:"tabnum",style:{fontWeight:"600"}}, String(h.totalCitas))),
      el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px"}},
        el("span",{style:{color:"var(--muted)"}},"Última visita"),
        el("span",{class:"tabnum",style:{fontWeight:"600"}}, h.ultimaFecha ? cap(fmtDiaLargo(fromKey(h.ultimaFecha))) : "—")),
      el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px"}},
        el("span",{style:{color:"var(--muted)"}},"Total gastado"),
        el("span",{class:"tabnum",style:{fontWeight:"600",color:"var(--accent)"}}, eur(h.totalGastado))),
      h.topServicios.length ? el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"13px",gap:"10px"}},
        el("span",{style:{color:"var(--muted)",flexShrink:"0"}},"Servicios habituales"),
        el("span",{style:{textAlign:"right"}}, h.topServicios.join(", "))) : null
    ));

    const premio = premioFidelidad(cliente.nombre);
    if(premio){
      const mensajeNotificacion = "¡Hola "+cliente.nombre+"!\n\nLlevas varios meses consecutivos sin faltar a tu cita y te quiero recompensar.\nTe regalo: "+state.fidelidadPremio+"\n\nTe espero en tu próxima cita. 💝";
      const whatsappUrl = "https://wa.me/?text="+encodeURIComponent(mensajeNotificacion);
      sheet.appendChild(el("div",{style:{padding:"14px",marginBottom:"18px",borderRadius:"12px",background:"var(--accentSoft)",border:"1px solid var(--accent)"}},
        el("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"12px"}},
          el("span",{style:{color:"var(--accent)",flexShrink:"0"}}, icon("check",18)),
          el("span",{style:{fontSize:"13px",lineHeight:"1.35",color:"var(--ink)"}},
            el("strong",{},"¡Clienta fiel! "),
            "Lleva "+premio.racha+" meses seguidos viniendo. Puedes ofrecerle "+state.fidelidadPremio+".")
        ),
        el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"10px"}},
          el("button",{class:"chip",style:{background:"#25D366",color:"#fff",border:"none"},onClick:()=>window.open(whatsappUrl,"_blank")},
            icon("send",14)," WhatsApp"),
          el("button",{class:"chip",onClick:()=>{
            navigator.clipboard.writeText(mensajeNotificacion).then(()=>toast("Mensaje copiado")).catch(()=>toast("Error al copiar"));
          }},
            icon("copy",14)," Copiar mensaje")
        )
      ));
    }
  }

  const nombreInput = el("input",{class:"field",placeholder:"Nombre de la clienta"});
  nombreInput.value = cliente ? cliente.nombre : "";
  const telInput = el("input",{class:"field",type:"text",placeholder:"Ej. 612 345 678"});
  telInput.value = cliente ? (cliente.telefono||"") : "";
  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"0"}});

  const campos = [
    el("div",{}, el("label",{class:"label"},"Nombre"), nombreInput),
    el("div",{}, el("label",{class:"label"},"Teléfono"), telInput),
    err
  ];
  if(contactsSupported()){
    campos.unshift(el("button",{class:"chip",style:{alignSelf:"flex-start"}, onClick: async ()=>{
      const picked = await pickContact();
      if(picked){ if(picked.nombre) nombreInput.value=picked.nombre; if(picked.tel) telInput.value=picked.tel; }
      else toast("No se pudo importar el contacto");
    }}, icon("upload",14), "Importar de contactos"));
  }
  sheet.appendChild(el("div",{style:{display:"flex",flexDirection:"column",gap:"14px"}}, campos));

  function guardar(){
    const nombre = nombreInput.value.trim();
    if(!nombre){ err.textContent="Escribe el nombre."; return; }
    const tel = telInput.value.trim();
    const nuevo = Object.assign({}, state.clientes);
    if(cliente && cliente.nombre && cliente.nombre!==nombre) delete nuevo[cliente.nombre];
    nuevo[nombre] = tel;
    state.clientes = nuevo;
    save();
    if(opts.onSelect){ closeOverlays(); opts.onSelect(nombre, tel); }
    else { toast("Clienta guardada"); openClientesView(opts); }
  }
  function borrar(){
    const nuevo = Object.assign({}, state.clientes);
    delete nuevo[cliente.nombre];
    state.clientes = nuevo;
    save(); toast("Clienta eliminada"); openClientesView(opts);
  }

  const actions = el("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}});
  if(cliente){
    actions.appendChild(el("button",{"aria-label":"Eliminar clienta",
      style:{height:"48px",width:"48px",display:"grid",placeItems:"center",borderRadius:"12px",flexShrink:"0",background:"#F4E6E4",color:"var(--danger)"},
      onClick:borrar}, icon("trash",18)));
  }
  actions.appendChild(el("button",{class:"primary",style:{flex:"1",height:"48px"}, onClick:guardar},"Guardar"));
  sheet.appendChild(actions);

  document.body.appendChild(overlay);
}

/* ============ modal gasto ============ */
function openGasto(gasto, mesRef, onDone){
  closeOverlays();
  const { overlay, sheet } = buildSheet();

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}}, gasto?"Editar gasto":"Nuevo gasto"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:()=>{ closeOverlays(); onDone&&onDone(); }}, icon("x",20))
  ));

  const fechaInput = el("input",{class:"field",type:"date"});
  const hoy = new Date();
  const fechaDefecto = (hoy.getFullYear()===mesRef.getFullYear() && hoy.getMonth()===mesRef.getMonth()) ? hoy : mesRef;
  fechaInput.value = gasto ? gasto.fecha : toKey(fechaDefecto);
  const conceptoInput = el("input",{class:"field",placeholder:"Ej. esmaltes, geles, limas…"});
  conceptoInput.value = gasto ? (gasto.concepto||"") : "";

  // chips de conceptos fijos guardados
  const conceptoChips = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px",marginBottom:"8px"}});
  function renderConceptoChips(){
    conceptoChips.innerHTML="";
    (state.conceptosGasto||[]).forEach(nombre=>{
      const on = normTxt(conceptoInput.value)===normTxt(nombre);
      const chip = el("button",{type:"button",class:"chip"+(on?" chip-on":""),
        onClick:()=>{ conceptoInput.value=nombre; renderConceptoChips(); }});
      if(on) chip.appendChild(icon("check",14));
      chip.appendChild(document.createTextNode(nombre));
      conceptoChips.appendChild(chip);
    });
  }
  renderConceptoChips();
  conceptoInput.addEventListener("input", renderConceptoChips);

  const importeInput = el("input",{class:"field",type:"number",step:"0.01",min:"0",inputmode:"decimal",placeholder:"0.00"});
  importeInput.value = gasto ? (gasto.importe||"") : "";
  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"0"}});

  sheet.appendChild(el("div",{style:{display:"flex",flexDirection:"column",gap:"14px"}},
    el("div",{}, el("label",{class:"label"},"Fecha"), fechaInput),
    el("div",{}, el("label",{class:"label"},"Concepto"), conceptoChips, conceptoInput),
    el("div",{}, el("label",{class:"label"},"Importe (€)"), importeInput),
    err
  ));

  function guardar(){
    if(!fechaInput.value){ err.textContent="Elige una fecha."; return; }
    const importe = parseFloat(importeInput.value);
    if(!importe || importe<=0){ err.textContent="Pon un importe válido."; return; }
    const obj = {
      id: (gasto && gasto.id) ? gasto.id : (Date.now()+"-"+Math.random().toString(36).slice(2,7)),
      fecha: fechaInput.value, concepto: conceptoInput.value.trim(), importe: importe
    };
    const arr = state.gastos.slice();
    if(gasto && gasto.id){ const i=arr.findIndex(x=>x.id===gasto.id); if(i>=0) arr[i]=obj; else arr.push(obj); }
    else arr.push(obj);
    state.gastos = arr;
    save(); closeOverlays(); toast("Gasto guardado"); onDone&&onDone();
  }
  function borrar(){
    state.gastos = state.gastos.filter(x=>x.id!==gasto.id);
    save(); closeOverlays(); toast("Gasto eliminado"); onDone&&onDone();
  }

  const actions = el("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}});
  if(gasto){
    actions.appendChild(el("button",{"aria-label":"Eliminar gasto",
      style:{height:"48px",width:"48px",display:"grid",placeItems:"center",borderRadius:"12px",flexShrink:"0",background:"#F4E6E4",color:"var(--danger)"},
      onClick:borrar}, icon("trash",18)));
  }
  actions.appendChild(el("button",{class:"primary",style:{flex:"1",height:"48px"}, onClick:guardar},"Guardar"));
  sheet.appendChild(actions);

  document.body.appendChild(overlay);
}

/* ============ pantalla de disponibilidad para compartir ============ */
async function openDisponibilidad(mesInicial){
  closeOverlays();
  let viewMonth = (mesInicial instanceof Date) ? new Date(mesInicial.getFullYear(), mesInicial.getMonth(), 1) : new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  const { overlay, sheet } = buildSheet();

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:"4px"}},
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 14px",color:"var(--muted)"}},
    "Una imagen con los horarios libres, lista para enviar por WhatsApp."));

  const nav = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px"}});
  const monthLabel = el("p",{class:"serif",style:{fontSize:"16px",margin:"0"}});
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes anterior",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1); actualizar(); }}, icon("chevron-left",18)));
  nav.appendChild(monthLabel);
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes siguiente",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1); actualizar(); }}, icon("chevron-right",18)));
  sheet.appendChild(nav);

  let rangoSel = "q1";
  let fechaInicio = null, fechaFin = null;
  
  const rangoWrap = el("div",{style:{display:"flex",gap:"8px",marginBottom:"14px",flexWrap:"wrap"}});
  const rangoPersonalizadoWrap = el("div",{style:{display:"none",gap:"8px",marginBottom:"14px",flexDirection:"column"}});
  
  function renderRango(){
    rangoWrap.innerHTML="";
    [["q1","1ª quincena"],["q2","2ª quincena"],["mes","Mes entero"],["semana","Esta semana"],["rango","Rango personalizado"]].forEach(([val,label])=>{
      const on = rangoSel===val;
      rangoWrap.appendChild(el("button",{type:"button",class:"chip"+(on?" chip-on":""),
        onClick:()=>{ rangoSel=val; renderRango(); rangoPersonalizadoWrap.style.display = val==="rango"?"flex":"none"; actualizar(); }}, label));
    });
  }
  
  rangoPersonalizadoWrap.appendChild(el("label",{style:{fontSize:"12px",color:"var(--muted)",marginBottom:"4px"}},"Desde:"));
  const inputInicio = el("input",{type:"date",style:{padding:"8px",borderRadius:"8px",border:"1px solid var(--line)",fontSize:"14px",marginBottom:"10px"}});
  rangoPersonalizadoWrap.appendChild(inputInicio);
  
  rangoPersonalizadoWrap.appendChild(el("label",{style:{fontSize:"12px",color:"var(--muted)",marginBottom:"4px"}},"Hasta:"));
  const inputFin = el("input",{type:"date",style:{padding:"8px",borderRadius:"8px",border:"1px solid var(--line)",fontSize:"14px",marginBottom:"10px"}});
  rangoPersonalizadoWrap.appendChild(inputFin);
  
  inputInicio.addEventListener("change",()=>{ fechaInicio=inputInicio.value; actualizar(); });
  inputFin.addEventListener("change",()=>{ fechaFin=inputFin.value; actualizar(); });
  
  renderRango();
  sheet.appendChild(rangoWrap);
  sheet.appendChild(rangoPersonalizadoWrap);

  sheet.appendChild(el("h3",{class:"serif",style:{fontSize:"20px",margin:"14px 0 8px 0"}},"Disponibilidad"));

  const previewWrap = el("div",{style:{borderRadius:"14px",overflow:"hidden",border:"1px solid var(--line)",marginBottom:"10px",background:"var(--bg)",minHeight:"120px",display:"flex",alignItems:"center",justifyContent:"center"}});
  const img = el("img",{style:{display:"block",width:"100%"}});
  previewWrap.appendChild(img);
  sheet.appendChild(previewWrap);

  const estadoTxt = el("p",{style:{fontSize:"12px",color:"var(--muted)",textAlign:"center",margin:"0 0 14px"}}, "Generando…");
  sheet.appendChild(estadoTxt);

  let canvasActual = null;

  function etiquetaRango(){
    if(rangoSel==="q1"){
      const mes = cap(fmtMes(viewMonth));
      return "1–15 "+mes;
    }
    if(rangoSel==="q2"){
      const mes = cap(fmtMes(viewMonth));
      return "16–fin "+mes;
    }
    if(rangoSel==="semana") return "Esta semana";
    if(rangoSel==="rango" && fechaInicio && fechaFin){
      return fechaInicio + " – " + fechaFin;
    }
    const mes = cap(fmtMes(viewMonth));
    return mes;
  }

  async function actualizar(){
    monthLabel.textContent = cap(fmtMes(viewMonth));
    estadoTxt.textContent = "Generando…";
    
    let dias = [];
    if(rangoSel==="rango" && fechaInicio && fechaFin){
      dias = diasDisponibles("rango", fechaInicio, fechaFin);
    } else {
      dias = diasDisponibles(rangoSel, null, null, viewMonth);
    }
    
    canvasActual = await generarImagenDisponibilidad(viewMonth, dias, etiquetaRango());
    img.src = canvasActual.toDataURL("image/png");
    estadoTxt.textContent = dias.length
      ? "Huecos libres en "+dias.length+" día"+(dias.length===1?"":"s")+"."
      : "No quedan horarios libres en este periodo.";
  }

  const actions = el("div",{style:{display:"flex",gap:"8px"}});
  actions.appendChild(el("button",{class:"chip", onClick:actualizar}, icon("calendar",14), "Actualizar"));
  actions.appendChild(el("button",{class:"primary",
    style:{flex:"1",height:"48px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},
    onClick:()=>{
      if(!canvasActual) return;
      canvasActual.toBlob(async (blob)=>{
        const nombreArchivo = "disponibilidad-"+toKey(viewMonth)+"-"+rangoSel+".png";
        try{
          const file = new File([blob], nombreArchivo, {type:"image/png"});
          if(navigator.canShare && navigator.canShare({files:[file]})){
            await navigator.share({files:[file], title:"Disponibilidad"});
            return;
          }
        }catch(e){}
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = nombreArchivo;
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(()=>URL.revokeObjectURL(url), 1000);
        toast("Imagen descargada");
      }, "image/png");
    }
  }, icon("download",16), "Descargar / Compartir"));
  sheet.appendChild(actions);

  document.body.appendChild(overlay);
  actualizar();
}

/* ============ modal calendario mensual ============ */
/* ============ estadísticas del mes ============ */
function openEstadisticasMes(mesInicial){
  closeOverlays();
  let viewMonth = (mesInicial instanceof Date) ? new Date(mesInicial.getFullYear(), mesInicial.getMonth(), 1) : new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  const { overlay, sheet } = buildSheet();

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}},"Estadísticas"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));

  const nav = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"16px"}});
  const monthLabel = el("p",{class:"serif",style:{fontSize:"16px",margin:"0"}});
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes anterior",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1); renderStats(); }}, icon("chevron-left",18)));
  nav.appendChild(monthLabel);
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes siguiente",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+1,1); renderStats(); }}, icon("chevron-right",18)));
  sheet.appendChild(nav);

  const lista = el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  sheet.appendChild(lista);

  function fila(label, valor){
    return el("div",{class:"card",style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px"}},
      el("span",{style:{fontSize:"13px",color:"var(--muted)"}}, label),
      el("span",{class:"tabnum",style:{fontWeight:"600",fontSize:"14px"}}, valor)
    );
  }
  function renderStats(){
    monthLabel.textContent = cap(fmtMes(viewMonth));
    const st = estadisticasMes(viewMonth);
    const nombreAntL = (state.nombreAnticipo||"Anticipo");
    lista.innerHTML = "";
    lista.appendChild(fila("Citas del mes", String(st.totalCitasMes)));
    lista.appendChild(fila("Servicio más solicitado", st.servicioTop));
    lista.appendChild(fila("Día con más trabajo", st.diaTop));
    lista.appendChild(fila("Ticket medio (por cita cobrada)", eur(st.ticketMedio)));
    lista.appendChild(fila("Ingreso medio por cita agendada", eur(st.ingresoMedioPorCita)));
    // Solo mostrar lo de anticipos retenidos si hubo no-shows con anticipo en el mes
    if(st.citasNoAsistio>0 || st.anticiposRetenidos>0){
      lista.appendChild(fila("Ingresos por servicios", eur(st.ingresosPorServicios)));
      lista.appendChild(fila(nombreAntL+"s retenidos (no asistió)", eur(st.anticiposRetenidos)));
      lista.appendChild(fila("Ingresos totales", eur(st.ingresosPorServicios + st.anticiposRetenidos)));
    }
  }
  renderStats();

  sheet.appendChild(el("p",{style:{fontSize:"11px",margin:"14px 0 0",color:"var(--muted)"}},
    "El ingreso medio por cita agendada cuenta también las que no se cobraron (no vinieron); el ticket medio solo cuenta las cobradas."));

  document.body.appendChild(overlay);
}

function openMonthView(mesInicial){

  const { overlay, sheet } = buildSheet();

  ));
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 14px",color:"var(--muted)"}},"Días con citas y días libres, de un vistazo."));

  const nav = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}});
  const monthLabel = el("p",{class:"serif",style:{fontSize:"16px",margin:"0"}});
  nav.appendChild(el("button",{class:"ico","aria-label":"Mes anterior",
    onClick:()=>{ viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()-1,1); renderGrid(); }}, icon("chevron-left",18)));
  nav.appendChild(monthLabel);

  sheet.appendChild(el("button",{class:"chip",style:{marginBottom:"14px"},
    onClick:()=>openDisponibilidad(viewMonth)}, icon("download",14), "Compartir disponibilidad"));

  sheet.appendChild(el("button",{class:"chip",style:{marginBottom:"14px",marginLeft:"8px"},
    onClick:()=>openEstadisticasMes(viewMonth)}, icon("calendar",14), "Estadísticas del mes"));

  let modoVacaciones = false;
  const vacBtn = el("button",{class:"chip", onClick:()=>{
    modoVacaciones = !modoVacaciones;
    vacBtn.className = "chip"+(modoVacaciones?" chip-on":"");
    vacHint.style.display = modoVacaciones ? "block" : "none";
  }}, icon("calendar",14), "Marcar vacaciones");
  const vacHint = el("p",{style:{fontSize:"11px",color:"var(--accent)",margin:"-6px 0 14px",display:"none"}},
    "Toca los días que quieras marcar. Vuelve a tocar el botón para salir del modo.");
  sheet.appendChild(vacBtn);
  sheet.appendChild(vacHint);

  const totalMesLine = el("p",{style:{fontSize:"15px",fontWeight:"600",color:"var(--accent)",margin:"0 0 2px",textAlign:"center"}});
  sheet.appendChild(totalMesLine);
  const desgloseLine = el("p",{style:{fontSize:"12px",margin:"0 0 6px",textAlign:"center",color:"var(--muted)"}});
  sheet.appendChild(desgloseLine);
  const gananciaLine = el("p",{style:{fontSize:"13px",fontWeight:"600",margin:"0 0 2px",textAlign:"center",color:"var(--ink)"}});
  sheet.appendChild(gananciaLine);
  const propinaLine = el("p",{style:{fontSize:"12px",margin:"0 0 14px",textAlign:"center",color:"var(--muted)"}});
  sheet.appendChild(propinaLine);

  const headersRow = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:"6px"}});
  ["L","M","X","J","V","S","D"].forEach(d=>{
    headersRow.appendChild(el("span",{style:{textAlign:"center",fontSize:"10px",fontWeight:"500",letterSpacing:".5px",textTransform:"uppercase",color:"var(--muted)"}}, d));
  });
  sheet.appendChild(headersRow);

  const cellsWrap = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"5px",marginBottom:"14px"}});
  sheet.appendChild(cellsWrap);

  function esLaboral(d){
    const day = d.getDay(); // 0=domingo
    if(day===0) return false;
    if(day===6) return state.incluirSabado;
    return true;
  }

  function renderGrid(){
    monthLabel.textContent = cap(fmtMes(viewMonth));
    const cobrado = totalMes(viewMonth);
    const gastado = totalGastosMes(viewMonth);
    totalMesLine.textContent = "Total cobrado: " + eur(cobrado);
    desgloseLine.textContent = "Efectivo "+eur(totalMes(viewMonth,"efectivo"))+" · Tarjeta "+eur(totalMes(viewMonth,"tarjeta"))+" · Bizum "+eur(totalMes(viewMonth,"bizum"));
    gananciaLine.textContent = "Gastos: -"+eur(gastado)+"   →   Ganancia neta: "+eur(cobrado-gastado);
    propinaLine.textContent = "Propinas (a parte): "+eur(propinasMes(viewMonth));
    cellsWrap.innerHTML = "";
    const gridStart = startOfWeek(viewMonth);
    for(let i=0;i<42;i++){
      const d = addDays(gridStart,i);
      const inMonth = d.getMonth()===viewMonth.getMonth();
      const k = toKey(d);
      const count = (state.citas[k]||[]).length;
      const laboral = esLaboral(d);
      const isToday = k===todayKey;
      const isSel = k===selectedKey;
      const covered = laboral && count>0;
      const enVacacion = esVacacion(k);
      const cell = el("button",{
        style:{position:"relative",aspectRatio:"1",borderRadius:"10px",
          display:"flex",alignItems:"center",justifyContent:"center",
          opacity: inMonth ? "1" : ".3",
          background: enVacacion ? "var(--line)" : (covered ? "var(--accent)" : "var(--paper)"),
          border: "1px solid "+(isSel ? "var(--accent)" : "var(--line)"),
          color: enVacacion ? "var(--muted)" : (covered ? "#fff" : (laboral ? "var(--ink)" : "var(--muted)"))},
        onClick:()=>{
          if(modoVacaciones){ toggleVacacion(k); renderGrid(); }
          else { closeOverlays(); irAAgenda(k); }
        }
      }, el("span",{class:"tabnum",style:{fontSize:"13px",fontWeight:isToday?"700":"400", textDecoration: enVacacion?"line-through":"none"}}, String(d.getDate())));
      if(isToday){
        cell.appendChild(el("span",{style:{position:"absolute",bottom:"4px",height:"3px",width:"3px",borderRadius:"9999px",
          background: covered ? "#fff" : "var(--accent)"}}));
      }
      cellsWrap.appendChild(cell);
    }
    renderGastos();
  }

  sheet.appendChild(el("div",{style:{display:"flex",gap:"14px",fontSize:"12px",color:"var(--muted)",marginBottom:"18px",flexWrap:"wrap"}},
    el("span",{style:{display:"flex",alignItems:"center",gap:"6px"}},
      el("span",{style:{height:"12px",width:"12px",borderRadius:"4px",background:"var(--accent)",display:"inline-block"}}), "Con citas"),
    el("span",{style:{display:"flex",alignItems:"center",gap:"6px"}},
      el("span",{style:{height:"12px",width:"12px",borderRadius:"4px",background:"var(--paper)",border:"1px solid var(--line)",display:"inline-block"}}), "Libre"),
    el("span",{style:{display:"flex",alignItems:"center",gap:"6px"}},
      el("span",{style:{height:"12px",width:"12px",borderRadius:"4px",background:"var(--line)",display:"inline-block"}}), "Vacaciones")
  ));

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px"}},
    el("p",{class:"label",style:{margin:"0"}},"Gastos del mes"),
    el("button",{class:"ico","aria-label":"Añadir gasto",
      onClick:()=>openGasto(null, viewMonth, ()=>openMonthView(viewMonth))}, icon("plus",16))
  ));
  const gastosList = el("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});
  sheet.appendChild(gastosList);

  function renderGastos(){
    gastosList.innerHTML = "";
    const lista = gastosDelMes(viewMonth).slice().sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if(lista.length===0){
      gastosList.appendChild(el("p",{style:{fontSize:"12px",color:"var(--muted)",margin:"0"}},"Sin gastos registrados este mes."));
      return;
    }
    lista.forEach(g=>{
      gastosList.appendChild(el("button",{style:{textAlign:"left",display:"flex",alignItems:"center",gap:"10px",
          padding:"9px 12px",borderRadius:"10px",background:"var(--paper)",border:"1px solid var(--line)"},
        onClick:()=>openGasto(g, viewMonth, ()=>openMonthView(viewMonth))},
        el("span",{class:"tabnum",style:{fontSize:"11px",color:"var(--muted)",whiteSpace:"nowrap"}}, cap(fmtDiaCorto(fromKey(g.fecha)))),
        el("span",{class:"truncate",style:{flex:"1",minWidth:"0",fontSize:"13px"}}, g.concepto||"Gasto"),
        el("span",{class:"tabnum",style:{fontSize:"13px",fontWeight:"600",color:"var(--danger)"}}, "-"+eur(g.importe))
      ));
    });
  }

  renderGrid();
  document.body.appendChild(overlay);
}

/* ============ backup ============ */
function exportar(){
  state.ultimoBackup = new Date().toISOString();
  save();
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "agenda-backup-"+toKey(new Date())+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  localStorage.removeItem(AVISO_KEY);
  toast("Copia guardada");
  render();
}
$("#fileInput").addEventListener("change", function(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(){
    try{
      const p = JSON.parse(reader.result);
      if(!p.citas) throw new Error("formato");
      const s = normServicios(p.servicios);
      state = {
        citas: normCitas(p.citas),
        servicios: s.length ? s : state.servicios,
        incluirSabado: typeof p.incluirSabado==="boolean" ? p.incluirSabado : state.incluirSabado,
        clientes: p.clientes ? normClientes(p.clientes) : state.clientes,
        gastos: p.gastos ? normGastos(p.gastos) : state.gastos,
        ultimoBackup: typeof p.ultimoBackup==="string" ? p.ultimoBackup : state.ultimoBackup,
        vacaciones: Array.isArray(p.vacaciones) ? p.vacaciones.filter(x=>typeof x==="string") : state.vacaciones,
        negocio: typeof p.negocio==="string" && p.negocio.trim() ? p.negocio : state.negocio,
        tema: TEMAS[p.tema] ? p.tema : state.tema,
        horarios: Array.isArray(p.horarios) && p.horarios.length ? p.horarios : state.horarios,
        logo: typeof p.logo==="string" ? p.logo : state.logo,
        piePersonalizado: typeof p.piePersonalizado==="string" ? p.piePersonalizado : state.piePersonalizado,
        fidelidadActiva: typeof p.fidelidadActiva==="boolean" ? p.fidelidadActiva : state.fidelidadActiva,
        fidelidadMeses: (typeof p.fidelidadMeses==="number" && p.fidelidadMeses>=2) ? p.fidelidadMeses : state.fidelidadMeses,
        fidelidadPremio: typeof p.fidelidadPremio==="string" && p.fidelidadPremio.trim() ? p.fidelidadPremio : state.fidelidadPremio,
        conceptosGasto: Array.isArray(p.conceptosGasto) ? p.conceptosGasto.filter(x=>typeof x==="string" && x.trim()) : state.conceptosGasto,
        configurado: true,
      };
      aplicarTema(state.tema);
      aplicarNombreNegocio(state.negocio);
      save(); closeOverlays(); render(); toast("Copia recuperada");
    }catch(err){ toast("El archivo no es una copia válida"); }
  };
  reader.readAsText(file);
  e.target.value="";
});

/* ============ arranque ============ */
load();
function arrancarApp(){
  render();
  if(!state.configurado) openConfiguracionNegocio(true);
}
if(pinActivo() && !sessionStorage.getItem(PIN_SESSION_KEY)){
  mostrarPantallaBloqueo(arrancarApp);
} else {
  arrancarApp();
}
</script>
