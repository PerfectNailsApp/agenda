<style>
  :root{
    --bg:#F3EEE9; --paper:#FBF8F4; --ink:#2B2622; --muted:#8A817A;
    --accent:#9C6B5E; --accentSoft:#EFE4DF; --line:#E5DBD3; --danger:#B4423A;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:Inter, system-ui, -apple-system, sans-serif;
    padding-top:env(safe-area-inset-top);
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none!important;} }
  .serif{font-family:Fraunces, Georgia, serif;}
  .wrap{max-width:480px;margin:0 auto;padding:26px 20px 130px;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,select,textarea{font-family:inherit;font-size:15px;}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .ico{height:36px;width:36px;display:grid;place-items:center;border-radius:9999px;
       background:var(--paper);border:1px solid var(--line);color:var(--ink);}
  .field{width:100%;border-radius:12px;padding:10px 14px;background:#fff;
         border:1px solid var(--line);color:var(--ink);}
  textarea.field{resize:vertical;}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:18px;}
  .primary{background:var(--accent);color:#fff;border-radius:12px;font-weight:500;}
  .chip{display:inline-flex;align-items:center;gap:6px;border-radius:9999px;
        padding:8px 13px;font-size:14px;background:#fff;border:1px solid var(--line);color:var(--ink);}
  .chip-on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .chip-price{opacity:.8;}
  .label{display:block;font-size:12px;font-weight:500;margin-bottom:6px;color:var(--muted);}
  .overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;
           justify-content:center;background:rgba(43,38,34,.28);}
  .sheet{width:100%;max-width:480px;max-height:90vh;overflow-y:auto;
         background:var(--bg);border-radius:24px 24px 0 0;padding:20px;
         padding-bottom:calc(20px + env(safe-area-inset-bottom));}

/* ============ iconos ============ */
const PATHS = {

  "message-circle":'<path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>',
  "users":'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  "settings":'<line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>',
  "trash":'<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  "pencil":'<path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
  "download":'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
  "upload":'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
  "clock":'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  "check":'<polyline points="20 6 9 17 4 12"/>',
  "book":'<path d="M4 19.5h16v-13H4m0 6h16"/><path d="M4 6h16M4 6V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2"/>',
};
function icon(name, size){
  size = size || 18;
  const s = document.createElement("span");
  s.style.display = "inline-flex";
  s.innerHTML = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+(PATHS[name]||"")+'</svg>';
  return s;
}

/* ============ helpers ============ */
const $ = (s)=>document.querySelector(s);
function el(tag, attrs){
  const n = document.createElement(tag);
  attrs = attrs || {};
  for(const k in attrs){
    const v = attrs[k];
    if(v==null) continue;
    if(k==="class") n.className = v;
    else if(k==="style" && typeof v==="object") Object.assign(n.style, v);
    else if(k.slice(0,2)==="on" && typeof v==="function") n.addEventListener(k.slice(2).toLowerCase(), v);
    else n.setAttribute(k, v);
  }
  for(let i=2;i<arguments.length;i++){
    let kid = arguments[i];
    if(Array.isArray(kid)){ kid.forEach(c=>append(n,c)); }
    else append(n, kid);
  }
  return n;
}
function append(n, kid){
  if(kid==null || kid===false) return;
  n.appendChild(typeof kid==="object" ? kid : document.createTextNode(String(kid)));
}

const pad = (n)=>String(n).padStart(2,"0");
const toKey = (d)=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const parseDate = (str) => {
  if(!str) return null;
  const [year, month, day] = str.split('-').map(Number);
  return new Date(year, month-1, day);
};
const fromKey = (k)=>{ const p=k.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); };
function startOfWeek(d){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
const DIAS_CORTO = ["L","M","X","J","V","S"];
const fmtMes = (d)=>new Intl.DateTimeFormat("es-ES",{month:"long",year:"numeric"}).format(d);
const fmtDiaLargo = (d)=>new Intl.DateTimeFormat("es-ES",{weekday:"long",day:"numeric",month:"long"}).format(d);
const fmtDiaCorto = (d)=>new Intl.DateTimeFormat("es-ES",{day:"numeric",month:"short"}).format(d);
const cap = (s)=> s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
const eur = (n)=> (Number.isInteger(n)? n : n.toFixed(2)) + " €";
const normTxt = (s)=> (s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," ");

function normServicios(arr){
  return (arr||[]).map(s => typeof s==="string"
    ? { nombre:s, precio:null, duracion:60 }
    : { nombre:s.nombre, precio: typeof s.precio==="number"? s.precio : null,
        duracion: (typeof s.duracion==="number" && s.duracion>0) ? s.duracion : 60 });
}
function normCitas(citas){
  const out = {};
  for(const k in (citas||{})){
    out[k] = (citas[k]||[]).map(c=>{
      let servicios = c.servicios;
      if(!Array.isArray(servicios)) servicios = c.servicio ? [c.servicio] : [];
      // Normalizar anticipo (opcional): {activo, importe, metodo}
      let anticipo = null;
      if(c.anticipo && typeof c.anticipo==="object" && c.anticipo.activo && typeof c.anticipo.importe==="number" && c.anticipo.importe>0){
        anticipo = { activo:true, importe:c.anticipo.importe, metodo: (typeof c.anticipo.metodo==="string"? c.anticipo.metodo : "") };
      }
      // Estado: solo guardamos "no_asistio" explícitamente; el resto se deriva de pago/anticipo
      const estado = (c.estado==="no_asistio") ? "no_asistio" : null;
      return { id:c.id, hora:c.hora||"", clienta:c.clienta||"", servicios:servicios, notas:c.notas||"", pago: c.pago||null,
        propina: typeof c.propina==="number" ? c.propina : 0,
        anticipo: anticipo, estado: estado };
    });
  }
  return out;
}
function normClientes(clientes){
  const out = {};
  for(const k in (clientes||{})){
    if(!k || !k.trim()) continue; // nombre vacío: descartar
    const tel = (typeof clientes[k]==="string") ? clientes[k].trim() : "";
    out[k] = tel; // se conserva el nombre AUNQUE no tenga teléfono
  }
  return out;
}
function normGastos(gastos){
  if(!Array.isArray(gastos)) return [];
  return gastos.filter(g=>g && g.fecha && typeof g.importe==="number").map(g=>({
    id: g.id || (Date.now()+"-"+Math.random().toString(36).slice(2,7)),
    fecha: g.fecha, concepto: g.concepto||"", importe: g.importe
  }));
}

/* ============ estado ============ */
let state = { citas:{}, servicios:SERVICIOS_DEFAULT, incluirSabado:true, clientes:{}, gastos:[], ultimoBackup:null, vacaciones:[],
  negocio:"Mi negocio", tema:"rosado", horarios:HORARIOS_DEFAULT.slice(), configurado:false, logo:null, piePersonalizado:"",
  fidelidadActiva:false, fidelidadMeses:5, fidelidadPremio:"un diseño gratis",
  conceptosGasto:["Autónomos","Luz","Agua","Local","Gestoría"],
  nombreAnticipo:"Anticipo",
  formasPago:[{id:"pendiente",nombre:"Pendiente"},{id:"efectivo",nombre:"Efectivo"},{id:"tarjeta",nombre:"Tarjeta"},{id:"bizum",nombre:"Bizum"}] };
let selectedKey = toKey(new Date());

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const p = JSON.parse(raw);
      const s = normServicios(p.servicios);
      state = {
        citas: normCitas(p.citas),
        servicios: s.length ? s : SERVICIOS_DEFAULT,
        incluirSabado: typeof p.incluirSabado==="boolean" ? p.incluirSabado : true,
        clientes: normClientes(p.clientes),
        gastos: normGastos(p.gastos),
        ultimoBackup: typeof p.ultimoBackup==="string" ? p.ultimoBackup : null,
        vacaciones: Array.isArray(p.vacaciones) ? p.vacaciones.filter(x=>typeof x==="string") : [],
        negocio: typeof p.negocio==="string" && p.negocio.trim() ? p.negocio : "Agenda",
        tema: TEMAS[p.tema] ? p.tema : "rosado",
        horarios: Array.isArray(p.horarios) && p.horarios.length ? p.horarios : HORARIOS_DEFAULT.slice(),
        logo: typeof p.logo==="string" ? p.logo : null,
        piePersonalizado: typeof p.piePersonalizado==="string" ? p.piePersonalizado : "",
        fidelidadActiva: p.fidelidadActiva===true,
        fidelidadMeses: (typeof p.fidelidadMeses==="number" && p.fidelidadMeses>=2) ? p.fidelidadMeses : 5,
        fidelidadPremio: typeof p.fidelidadPremio==="string" && p.fidelidadPremio.trim() ? p.fidelidadPremio : "un diseño gratis",
        conceptosGasto: Array.isArray(p.conceptosGasto) ? p.conceptosGasto.filter(x=>typeof x==="string" && x.trim()) : ["Autónomos","Luz","Agua","Local","Gestoría"],
        nombreAnticipo: typeof p.nombreAnticipo==="string" && p.nombreAnticipo.trim() ? p.nombreAnticipo.trim() : "Anticipo",
        formasPago: Array.isArray(p.formasPago) ? p.formasPago.filter(x=>x&&typeof x.id==="string"&&typeof x.nombre==="string") : [{id:"pendiente",nombre:"Pendiente"},{id:"efectivo",nombre:"Efectivo"},{id:"tarjeta",nombre:"Tarjeta"},{id:"bizum",nombre:"Bizum"}],
        configurado: true, // ya había datos guardados de antes: no forzar el asistente
      };
    }
  }catch(e){}
  aplicarTema(state.tema);
  aplicarNombreNegocio(state.configurado ? state.negocio : null);
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ toast("No se pudo guardar"); }
}

function precioDe(nombre){ const s=state.servicios.find(x=>x.nombre===nombre); return s && typeof s.precio==="number"? s.precio : 0; }
function totalCita(c){ return (c.servicios||[]).reduce((t,n)=>t+precioDe(n),0); }
/* ===== Helpers de anticipo / estado ===== */
function anticipoDe(c){ return (c && c.anticipo && c.anticipo.activo && c.anticipo.importe>0) ? c.anticipo.importe : 0; }
function tieneAnticipo(c){ return anticipoDe(c)>0; }
function noAsistio(c){ return c && c.estado==="no_asistio"; }
// Lo que queda por cobrar el día de la cita (total menos lo ya adelantado)
function pendienteCita(c){ return Math.max(0, totalCita(c) - anticipoDe(c)); }
// Ingreso real que ha generado la cita (para totales y estadísticas)
function ingresoCita(c){
  if(noAsistio(c)) return anticipoDe(c);   // no vino: solo se retiene el anticipo
  if(c.pago) return totalCita(c);          // cobrada por completo
  return 0;                                 // pendiente, aún no genera ingreso
}
function historialCliente(nombre){
  let totalCitas=0, totalGastado=0, ultimaFecha=null;
  const conteoServicios = {};
  const clave = normTxt(nombre);
  Object.keys(state.citas).sort().forEach(k=>{
    state.citas[k].forEach(c=>{
      if(normTxt(c.clienta)!==clave) return;
      totalCitas++;
      if(c.pago) totalGastado += totalCita(c) + (c.propina||0);
      if(!ultimaFecha || k>ultimaFecha) ultimaFecha = k;
      (c.servicios||[]).forEach(s=>{ conteoServicios[s]=(conteoServicios[s]||0)+1; });
    });
  });
  const topServicios = Object.entries(conteoServicios).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);
  return { totalCitas, totalGastado, ultimaFecha, topServicios };
}
function rachaMesesConsecutivos(nombre){
  // conjunto de meses (año*12+mes) en los que la clienta tuvo al menos una cita
  const meses = {};
  const clave = normTxt(nombre);
  Object.keys(state.citas).forEach(k=>{
    state.citas[k].forEach(c=>{
      if(normTxt(c.clienta)!==clave) return;
      const d = fromKey(k);
      meses[d.getFullYear()*12 + d.getMonth()] = true;
    });
  });
  const claves = Object.keys(meses).map(Number).sort((a,b)=>a-b);
  if(claves.length===0) return 0;
  // racha más larga de meses CONSECUTIVOS en todo el historial (pasado, presente o futuro)
  let mejor = 1, actual = 1;
  for(let i=1;i<claves.length;i++){
    if(claves[i] === claves[i-1]+1){ actual++; if(actual>mejor) mejor=actual; }
    else actual = 1;
  }
  return mejor;
}
function premioFidelidad(nombre){
  if(!state.fidelidadActiva) return null;
  const racha = rachaMesesConsecutivos(nombre);
  if(racha >= state.fidelidadMeses) return { racha };
  return null;
}
const DIAS_SEMANA_NOMBRE = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
function estadisticasMes(refDate){
  let totalCitasMes = 0, totalIngreso = 0, citasCobradas = 0;
  let anticiposRetenidos = 0, citasNoAsistio = 0;
  const porDia = {}, conteoServ = {};
  for(const k in state.citas){
    const d = fromKey(k);
    if(d.getFullYear()!==refDate.getFullYear() || d.getMonth()!==refDate.getMonth()) continue;
    state.citas[k].forEach(c=>{
      totalCitasMes++;
      porDia[d.getDay()] = (porDia[d.getDay()]||0)+1;
      (c.servicios||[]).forEach(s=>{ conteoServ[s]=(conteoServ[s]||0)+1; });
      if(noAsistio(c)){
        citasNoAsistio++;
        anticiposRetenidos += anticipoDe(c);
        return;
      }
      if(c.pago){ totalIngreso += totalCita(c); citasCobradas++; }
    });
  }
  const servicioTopEntry = Object.entries(conteoServ).sort((a,b)=>b[1]-a[1])[0];
  const diaTopEntry = Object.entries(porDia).sort((a,b)=>b[1]-a[1])[0];
  return {
    totalCitasMes,
    servicioTop: servicioTopEntry ? servicioTopEntry[0] : "—",
    diaTop: diaTopEntry ? DIAS_SEMANA_NOMBRE[Number(diaTopEntry[0])] : "—",
    ticketMedio: citasCobradas ? totalIngreso/citasCobradas : 0,
    ingresoMedioPorCita: totalCitasMes ? totalIngreso/totalCitasMes : 0,
    anticiposRetenidos, citasNoAsistio,
    ingresosPorServicios: totalIngreso,
  };
}
function clientasInactivas(){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const out = [];
  Object.keys(state.clientes).forEach(nombre=>{
    const h = historialCliente(nombre);
    if(!h.ultimaFecha) return;
    const dias = Math.floor((hoy - fromKey(h.ultimaFecha)) / 86400000);
    if(dias>=30) out.push({ nombre, dias, telefono: state.clientes[nombre] });
  });
  return out.sort((a,b)=>b.dias-a.dias);
}
function proximaCitaHoy(){
  const hoyKey = toKey(new Date());
  const ahora = new Date();
  const minutosAhora = ahora.getHours()*60 + ahora.getMinutes();
  const citasHoy = (state.citas[hoyKey]||[]).slice().sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));
  const siguiente = citasHoy.find(c=> horaAMinutos(c.hora) >= minutosAhora);
  return siguiente ? { cita: siguiente, dateKey: hoyKey } : null;
}
function clientasConPremio(){
  if(!state.fidelidadActiva) return [];
  const vistos = new Set();
  const out = [];
  Object.keys(state.clientes).forEach(n=>{
    const clave = normTxt(n);
    if(vistos.has(clave)) return;
    if(premioFidelidad(n)){ vistos.add(clave); out.push(n); }
  });
  return out;
}
function duracionDe(nombre){ const s=state.servicios.find(x=>x.nombre===nombre); return (s && typeof s.duracion==="number" && s.duracion>0) ? s.duracion : 60; }
function duracionCita(c){ return (c.servicios||[]).reduce((t,n)=>t+duracionDe(n),0) || 60; }
function horaAMinutos(hora){
  const p = (hora||"00:00").split(":");
  return (parseInt(p[0],10)||0)*60 + (parseInt(p[1],10)||0);
}
function slotsOcupados(dateKey, excluirId){
  const ocupados = {};
  (state.citas[dateKey]||[]).forEach(c=>{
    if(excluirId && c.id===excluirId) return;
    const inicio = horaAMinutos(c.hora);
    const fin = inicio + duracionCita(c);
    state.horarios.forEach(h=>{
      const m = horaAMinutos(h);
      if(m>=inicio && m<fin) ocupados[h]=true;
    });
  });
  return ocupados;
}
function resumenServicios(servicios){
  const conteo = {};
  (servicios||[]).forEach(n=>{ conteo[n] = (conteo[n]||0)+1; });
  return Object.keys(conteo).map(n=> conteo[n]>1 ? n+" ×"+conteo[n] : n).join(" + ");
}
function esVacacion(k){ return state.vacaciones.indexOf(k)>=0; }
function toggleVacacion(k){
  state.vacaciones = esVacacion(k) ? state.vacaciones.filter(x=>x!==k) : state.vacaciones.concat([k]);
  save();
}
function totalMes(refDate, metodo){
  let total = 0;
  for(const k in state.citas){
    const d = fromKey(k);
    if(d.getFullYear()===refDate.getFullYear() && d.getMonth()===refDate.getMonth()){
      state.citas[k].forEach(c=>{
        if(noAsistio(c)){
          // No vino: solo cuenta el anticipo retenido, atribuido a su método de pago
          const ant = anticipoDe(c);
          if(ant>0){
            if(metodo){ if(c.anticipo.metodo===metodo) total += ant; }
            else total += ant;
          }
          return;
        }
        if(!c.pago) return; // no cobrado todavía: no cuenta
        if(metodo && c.pago!==metodo) return;
        total += totalCita(c);
      });
    }
  }
  return total;
}
function propinasMes(refDate){
  let total = 0;
  for(const k in state.citas){
    const d = fromKey(k);
    if(d.getFullYear()===refDate.getFullYear() && d.getMonth()===refDate.getMonth()){
      state.citas[k].forEach(c=>{ if(c.pago) total += (c.propina||0); });
    }
  }
  return total;
}
function gastosDelMes(refDate){
  return state.gastos.filter(g=>{
    const d = fromKey(g.fecha);
    return d.getFullYear()===refDate.getFullYear() && d.getMonth()===refDate.getMonth();
  });
}
function totalGastosMes(refDate){
  return gastosDelMes(refDate).reduce((t,g)=>t+(g.importe||0),0);
}
function diasDesdeBackup(){
  if(!state.ultimoBackup) return Infinity;
  const ms = Date.now() - new Date(state.ultimoBackup).getTime();
  return Math.floor(ms / 86400000);
}

function formatHora12(hora24){
  if(!hora24) return "—";
  const partes = hora24.split(":");
  let h = parseInt(partes[0],10);
  const m = partes[1] || "00";
  if(!Number.isFinite(h)) return hora24;
  const ampm = h>=12 ? "pm" : "am";
  let h12 = h%12; if(h12===0) h12=12;
  return h12+":"+m+" "+ampm;
}
function diasDisponibles(rango, fechaInicio=null, fechaFin=null, mesEspecifico=null){
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const out = [];
  
  let inicio, fin;
  
  if(rango === "rango" && fechaInicio && fechaFin){
    // Rango personalizado
    inicio = parseDate(fechaInicio);
    fin = parseDate(fechaFin);
  } else if(rango === "semana"){
    // Esta semana: desde mañana hasta viernes
    const hoyDow = hoy.getDay();
    let offset = 1;
    if(hoyDow === 0) offset = 1; // Domingo → lunes
    else if(hoyDow === 6) offset = 2; // Sábado → lunes
    else if(hoyDow === 5) offset = 3; // Viernes → próximo lunes
    
    inicio = new Date(hoy);
    inicio.setDate(hoy.getDate() + offset);
    
    fin = new Date(inicio);
    // Buscar el viernes de esa semana
    while(fin.getDay() !== 5){
      fin.setDate(fin.getDate() + 1);
    }
  } else {
    // Quincenas o mes: calcular basado en mes actual o especificado
    const viewMonth = mesEspecifico || new Date();
    const year = viewMonth.getFullYear(), month = viewMonth.getMonth();
    const ultimoDia = new Date(year, month+1, 0).getDate();
    
    inicio = new Date(year, month, 1);
    if(rango === "q1") fin = new Date(year, month, 15);
    else if(rango === "q2") fin = new Date(year, month, ultimoDia);
    else fin = new Date(year, month, ultimoDia);
  }
  
  // Loop seguro por días
  const current = new Date(inicio);
  while(current <= fin){
    const dateCheck = new Date(current);
    dateCheck.setHours(0,0,0,0);
    
    if(dateCheck > hoy){
      const dow = dateCheck.getDay();
      if(dow !== 0 && (dow !== 6 || state.incluirSabado)){
        const k = toKey(dateCheck);
        if(!esVacacion(k)){
          const ocupadas = slotsOcupados(k);
          const libres = state.horarios.filter(h=>!ocupadas[h]).map(h=>({hora:h, label:formatHora12(h)}));
          if(libres.length) out.push({ fecha:dateCheck, dateKey:k, libres });
        }
      }
    }
    current.setDate(current.getDate() + 1);
  }
  
  return out;
}
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
async function generarImagenDisponibilidad(viewMonth, dias, subtitulo){
  if(document.fonts && document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }

  const W = 720, PAD = 56;
  const t = TEMAS[state.tema] || TEMAS.rosado;
  const COL = { bg:t.bg, ink:t.ink, muted:t.muted, accent:t.accent, accentSoft:t.accentSoft, line:t.line };
  const F_TITULO = "600 32px Fraunces, Georgia, serif";
  const F_NEGOCIO = "600 18px Inter, system-ui, sans-serif";
  const F_SUB = "500 17px Inter, system-ui, sans-serif";
  const F_FECHA = "600 16px Inter, system-ui, sans-serif";
  const F_CHIP = "600 14px Inter, system-ui, sans-serif";
  const F_VACIO = "400 15px Inter, system-ui, sans-serif";
  const F_FOOT = "italic 12px Inter, system-ui, sans-serif";

  // precargar el logo si existe
  let logoImg = null;
  if(state.logo){
    try{
      logoImg = await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=state.logo; });
    }catch(e){ logoImg = null; }
  }

  const tmp = document.createElement("canvas").getContext("2d");

  const tieneNombre = state.negocio && state.negocio!=="Agenda";
  const topOffset = (tieneNombre || logoImg) ? 34 : 0; // espacio extra arriba para logo/nombre

  const bloques = [];
  let y = PAD + 78 + topOffset;

  if(dias.length===0){
    bloques.push({ tipo:"vacio", y });
    y += 30;
  }

  dias.forEach(d=>{
    bloques.push({ tipo:"fecha", y, texto: cap(fmtDiaLargo(d.fecha)) });
    y += 24;
    tmp.font = F_CHIP;
    const chipH=34, gap=10, padX=16;
    let x=0, rowY=y, filas=[[]];
    d.libres.forEach(f=>{
      const w = tmp.measureText(f.label).width + padX*2;
      if(x+w > W-PAD*2 && filas[filas.length-1].length>0){ filas.push([]); x=0; rowY+=chipH+gap; }
      filas[filas.length-1].push({label:f.label, w});
      x += w+gap;
    });
    bloques.push({ tipo:"chips", filas, startY:y, chipH, gap, padX });
    const altoChips = filas.length*(chipH+gap)-gap;
    y += altoChips + 22;
  });

  bloques.push({ tipo:"footer", y });
  y += 26;
  if(state.piePersonalizado) y += 20;
  const H = y + PAD - 10;

  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = COL.bg; ctx.fillRect(0,0,W,H);
  ctx.textBaseline = "alphabetic";

  // logo + nombre del negocio
  let titleY = PAD+32;
  if(logoImg){
    const size = 44;
    roundRect(ctx, PAD, PAD-6, size, size, 10); ctx.save(); ctx.clip();
    ctx.drawImage(logoImg, PAD, PAD-6, size, size); ctx.restore();
  }
  if(tieneNombre){
    ctx.fillStyle = COL.accent; ctx.font = F_NEGOCIO;
    ctx.fillText(state.negocio, logoImg ? PAD+58 : PAD, PAD+22);
    titleY = PAD+32+topOffset;
  }

  ctx.fillStyle = COL.ink;
  ctx.font = F_TITULO;
  // Título "Disponibilidad" removido (ahora aparece como h3 antes de la imagen)


  ctx.fillStyle = COL.accent;
  ctx.font = F_SUB;
  ctx.fillText(subtitulo || cap(fmtMes(viewMonth)), PAD, titleY+28);

  ctx.strokeStyle = COL.line; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD, titleY+46); ctx.lineTo(W-PAD, titleY+46); ctx.stroke();

  bloques.forEach(b=>{
    if(b.tipo==="vacio"){
      ctx.fillStyle = COL.muted; ctx.font = F_VACIO;
      ctx.fillText("No quedan horarios libres este mes.", PAD, b.y+12);
    } else if(b.tipo==="fecha"){
      ctx.fillStyle = COL.ink; ctx.font = F_FECHA;
      ctx.fillText(b.texto, PAD, b.y+12);
    } else if(b.tipo==="chips"){
      ctx.font = F_CHIP;
      let rowY = b.startY;
      b.filas.forEach(fila=>{
        let x = PAD;
        fila.forEach(c=>{
          ctx.fillStyle = COL.accentSoft;
          roundRect(ctx, x, rowY, c.w, b.chipH, b.chipH/2); ctx.fill();
          ctx.fillStyle = COL.accent;
          ctx.fillText(c.label, x+b.padX, rowY+b.chipH/2+5);
          x += c.w + b.gap;
        });
        rowY += b.chipH + b.gap;
      });
    } else if(b.tipo==="footer"){
      ctx.strokeStyle = COL.line;
      ctx.beginPath(); ctx.moveTo(PAD, b.y); ctx.lineTo(W-PAD, b.y); ctx.stroke();
      ctx.fillStyle = COL.muted; ctx.font = F_FOOT;
      const ahora = new Date();
      ctx.fillText("Actualizado el "+toKey(ahora)+" · "+pad(ahora.getHours())+":"+pad(ahora.getMinutes())+" h", PAD, b.y+22);
      if(state.piePersonalizado){
        ctx.fillStyle = COL.accent; ctx.font = "600 13px Inter, system-ui, sans-serif";
        ctx.fillText(state.piePersonalizado, PAD, b.y+42);
      }
    }
  });

  return canvas;
}

async function pickContact(){

/* ============ PIN de acceso ============ */
async function hashPin(pin){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function pinActivo(){ return localStorage.getItem(PIN_ENABLED_KEY)==="1" && !!localStorage.getItem(PIN_HASH_KEY); }
async function guardarPin(pin){
  localStorage.setItem(PIN_HASH_KEY, await hashPin(pin));
  localStorage.setItem(PIN_ENABLED_KEY, "1");
  localStorage.setItem("agenda_pin_len", String(pin.length));
}
function quitarPin(){
  localStorage.removeItem(PIN_HASH_KEY);
  localStorage.removeItem(PIN_ENABLED_KEY);
  sessionStorage.removeItem(PIN_SESSION_KEY);
}
async function pinCorrecto(pin){
  const guardado = localStorage.getItem(PIN_HASH_KEY);
  if(!guardado) return false;
  return (await hashPin(pin)) === guardado;
}
function longitudPinGuardado(){
  const n = parseInt(localStorage.getItem("agenda_pin_len"),10);
  return (n===4||n===6) ? n : 4;
}

function mostrarPantallaBloqueo(onUnlock){
  const overlay = el("div",{style:{position:"fixed",inset:"0",zIndex:"200",background:"var(--bg)",
    display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}});

  let intento = "";
  const largo = longitudPinGuardado();

  overlay.appendChild(el("p",{class:"serif",style:{fontSize:"20px",margin:"0 0 6px"}}, "Introduce tu PIN"));
  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",minHeight:"16px",margin:"0 0 16px"}});
  overlay.appendChild(err);

  const dots = el("div",{style:{display:"flex",gap:"14px",marginBottom:"28px"}});
  function renderDots(){
    dots.innerHTML="";
    for(let i=0;i<largo;i++){
      dots.appendChild(el("span",{style:{height:"14px",width:"14px",borderRadius:"9999px",
        background: i<intento.length ? "var(--accent)" : "transparent",
        border:"1px solid var(--accent)"}}));
    }
  }
  renderDots();
  overlay.appendChild(dots);

  async function intentar(){
    if(await pinCorrecto(intento)){
      sessionStorage.setItem(PIN_SESSION_KEY,"1");
      overlay.remove();
      onUnlock();
    } else {
      err.textContent = "PIN incorrecto";
      intento = "";
      renderDots();
    }
  }
  function pulsar(n){
    if(intento.length>=largo) return;
    intento += n;
    err.textContent="";
    renderDots();
    if(intento.length===largo) intentar();
  }

  const pad = el("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,72px)",gap:"16px",justifyContent:"center"}});
  ["1","2","3","4","5","6","7","8","9","","0","←"].forEach(k=>{
    if(k===""){ pad.appendChild(el("span",{})); return; }
    pad.appendChild(el("button",{type:"button",
      style:{height:"72px",width:"72px",borderRadius:"9999px",fontSize:"22px",fontWeight:"500",
        background:"var(--paper)",border:"1px solid var(--line)",color:"var(--ink)"},
      onClick:()=>{
        if(k==="←"){ intento = intento.slice(0,-1); err.textContent=""; renderDots(); return; }
        pulsar(k);
      }
    }, k));
  });
  overlay.appendChild(pad);

  overlay.appendChild(el("button",{style:{marginTop:"26px",fontSize:"12px",color:"var(--muted)",textDecoration:"underline"},
    onClick:()=>{
      if(confirm("Esto va a quitar el PIN para que puedas volver a entrar. Tendrás que configurarlo de nuevo si quieres. ¿Seguro?")){
        quitarPin();
        overlay.remove();
        onUnlock();
        toast("PIN eliminado");
      }
    }
  }, "¿Olvidaste tu PIN?"));

  document.body.appendChild(overlay);
}

  const inactivas60 = clientasInactivas().filter(c=>c.dias>=60);

    avisos.push({ icono:"⚠️", texto: inactivas60.length+" clienta"+(inactivas60.length===1?"":"s")+" lleva"+(inactivas60.length===1?"":"n")+" más de 60 días sin venir." });
  }
  const conPremio = clientasConPremio();
  if(conPremio.length===1){
    avisos.push({ icono:"🎁", texto: conPremio[0]+" cumple recompensa de fidelidad." });
  } else if(conPremio.length>1){
    avisos.push({ icono:"🎁", texto: conPremio.length+" clientas cumplen recompensa de fidelidad." });
  }
  if(avisos.length>0){
    wrap.appendChild(tarjeta(
      el("p",{class:"label",style:{margin:"0 0 8px"}},"Avisos"),
      el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}},
        ...avisos.map(a=> el("p",{style:{fontSize:"13px",margin:"0",display:"flex",gap:"8px",alignItems:"flex-start"}},
          el("span",{},a.icono), el("span",{},a.texto)))
      )
    ));
  }

  // ---- Acciones rápidas ----
  wrap.appendChild(tarjeta(
    el("p",{class:"label",style:{margin:"0 0 10px"}},"Acciones rápidas"),
    el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}},
      el("button",{class:"primary",style:{height:"46px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},
        onClick:()=>{ irAAgenda(hoyKey); openCita(hoyKey, null); }}, icon("plus",16), "Nueva cita"),
      el("button",{style:{height:"46px",borderRadius:"12px",background:"var(--bg)",border:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},
        onClick:()=>openClientesView()}, icon("users",16), "Clientas"),
      el("button",{style:{height:"46px",borderRadius:"12px",background:"var(--bg)",border:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},
        onClick:()=>irAAgenda()}, icon("calendar",16), "Calendario"),
      el("button",{style:{height:"46px",borderRadius:"12px",background:"var(--bg)",border:"1px solid var(--line)",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"},
        onClick:()=>openEstadisticasMes(mesActual)}, icon("calendar",16), "Estadísticas")
    )
  ));

  return wrap;
}

function buildMain(){

  const headBtns = el("div",{style:{display:"flex",gap:"8px"}},
    el("button",{class:"ico","aria-label":"Inicio", onClick:irAInicio}, icon("home",17)),

    el("button",{class:"ico","aria-label":"Calendario", onClick:()=>openMonthView()}, icon("calendar",17)),
    el("button",{class:"ico","aria-label":"Manual", onClick:openManualView}, icon("book",17)),

  );
  header.appendChild(titleBox); header.appendChild(headBtns);
  wrap.appendChild(header);

  const aviso = buildAvisoBackup();
  if(aviso) wrap.appendChild(aviso);

  const selDate = fromKey(selectedKey);
  const wkStart = startOfWeek(selDate);

  const nav = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}});

    center.appendChild(el("button",{style:{fontSize:"12px",color:"var(--accent)",textDecoration:"underline",textUnderlineOffset:"2px",marginTop:"2px"},
      onClick:()=>{ selectedKey = todayKey; render(); }},"Ir a hoy"));
  }
  nav.appendChild(center);
  nav.appendChild(el("button",{class:"ico","aria-label":"Semana siguiente",
    onClick:()=>{ selectedKey = toKey(addDays(selDate,7)); render(); }}, icon("chevron-right",18)));
  wrap.appendChild(nav);

  // tira de días
  const strip = el("div",{style:{display:"grid",gap:"6px",gridTemplateColumns:"repeat("+numDias+",minmax(0,1fr))",marginBottom:"24px"}});
  for(let i=0;i<numDias;i++){
    const d = addDays(wkStart,i);
    const k = toKey(d);
    const isSel = k===selectedKey;
    const isToday = k===todayKey;
    const count = (state.citas[k]||[]).length;
    const cell = el("button",{style:{position:"relative",borderRadius:"16px",padding:"10px 0",
      display:"flex",flexDirection:"column",alignItems:"center",
      background:isSel?"var(--accent)":"var(--paper)",
      border:"1px solid "+(isSel?"var(--accent)":"var(--line)"),
      color:isSel?"#fff":"var(--ink)"},
      onClick:()=>{ selectedKey=k; render(); }},
      el("span",{style:{fontSize:"10px",textTransform:"uppercase",letterSpacing:".5px",color:isSel?"rgba(255,255,255,.8)":"var(--muted)"}}, DIAS_CORTO[i]),
      el("span",{class:"serif",style:{fontSize:"18px",lineHeight:"1.1"}}, String(d.getDate()))
    );
    if(isToday && !isSel){
      cell.appendChild(el("span",{style:{position:"absolute",bottom:"5px",height:"4px",width:"4px",borderRadius:"9999px",background:"var(--accent)"}}));
    }
    if(count>0){
      cell.appendChild(el("span",{style:{position:"absolute",top:"-4px",right:"-4px",minWidth:"16px",height:"16px",padding:"0 4px",
        display:"grid",placeItems:"center",borderRadius:"9999px",fontSize:"10px",fontWeight:"600",
        background:isSel?"#fff":"var(--accent)",color:isSel?"var(--accent)":"#fff"}}, String(count)));
    }
    strip.appendChild(cell);
  }
  wrap.appendChild(strip);

  // encabezado del día + total
  const citas = (state.citas[selectedKey]||[]).slice().sort((a,b)=>(a.hora||"").localeCompare(b.hora||""));
  const totalDia = citas.reduce((t,c)=> t+ingresoCita(c), 0);
  const propinasDia = citas.reduce((t,c)=> c.pago ? t+(c.propina||0) : t, 0);
  const dayHead = el("div",{style:{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:"12px"}});
  dayHead.appendChild(el("h2",{class:"serif",style:{fontSize:"20px",margin:"0"}}, cap(fmtDiaLargo(selDate))));
  const rightInfo = el("div",{style:{textAlign:"right",fontSize:"12px",color:"var(--muted)"}}, citas.length+" "+(citas.length===1?"cita":"citas"));
  if(totalDia>0) rightInfo.appendChild(el("span",{style:{display:"block",fontWeight:"600",color:"var(--accent)"}}, "Cobrado: "+eur(totalDia)));
  if(propinasDia>0) rightInfo.appendChild(el("span",{style:{display:"block",fontSize:"11px",color:"var(--muted)"}}, "Propina (aparte): "+eur(propinasDia)));
  dayHead.appendChild(rightInfo);
  wrap.appendChild(dayHead);

  if(esVacacion(selectedKey)){
    wrap.appendChild(el("div",{class:"card",style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",marginBottom:"12px",background:"var(--line)"}},
      el("span",{style:{fontSize:"13px",color:"var(--ink)"}}, "Marcado como vacaciones"),
      el("button",{style:{fontSize:"12px",color:"var(--accent)",fontWeight:"600"}, onClick:()=>{ toggleVacacion(selectedKey); render(); }}, "Quitar")
    ));
  }

  // lista de citas
  const list = el("div",{style:{display:"flex",flexDirection:"column",gap:"8px"}});
  if(citas.length===0){
    list.appendChild(el("div",{class:"card",style:{padding:"32px 16px",textAlign:"center",borderStyle:"dashed",color:"var(--muted)"}},
      el("p",{style:{fontSize:"14px",margin:"0"}},"Sin citas este día."),
      el("p",{style:{fontSize:"12px",margin:"4px 0 0"}},"Pulsa el botón + para añadir una.")
    ));
  } else {
    citas.forEach(c=>{
      const precio = totalCita(c);
      const card = el("div",{class:"card",style:{padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:"12px"}});
      const main = el("button",{style:{flex:"1",minWidth:"0",textAlign:"left",display:"flex",alignItems:"flex-start",gap:"12px",background:"none",border:"none",padding:"0",color:"inherit"},
        onClick:()=>openCita(selectedKey,c)});
      main.appendChild(el("span",{style:{display:"flex",alignItems:"center",gap:"4px",fontSize:"14px",fontWeight:"600",color:"var(--accent)",paddingTop:"2px",whiteSpace:"nowrap"},class:"tabnum"},
        icon("clock",13), formatHora12(c.hora)));
      const mid = el("span",{style:{flex:"1",minWidth:"0"}},
        el("span",{class:"truncate",style:{display:"block",fontSize:"15px",fontWeight:"500"}}, c.clienta),
        el("span",{class:"truncate",style:{display:"block",fontSize:"14px",color:"var(--muted)"}}, resumenServicios(c.servicios)||"Sin servicio")
      );
      if(c.notas) mid.appendChild(el("span",{class:"truncate",style:{display:"block",fontSize:"12px",marginTop:"2px",color:"var(--muted)"}}, c.notas));
      const pagoOn = !!c.pago;
      const esNoAsistio = noAsistio(c);
      const nombreAntL = (state.nombreAnticipo||"Anticipo");
      // Etiqueta de estado
      const estadoBadge = el("span",{style:{display:"inline-block",marginTop:"5px",fontSize:"11px",fontWeight:"500",padding:"2px 9px",borderRadius:"9999px"}});
      if(esNoAsistio){
        estadoBadge.style.background = "#F4E6E4"; estadoBadge.style.color = "var(--danger)";
        estadoBadge.textContent = "No asistió";
      } else if(pagoOn){
        estadoBadge.style.background = "var(--accentSoft)"; estadoBadge.style.color = "var(--accent)";
        estadoBadge.textContent = PAGO_LABELS[c.pago] || "Cobrado";
      } else {
        estadoBadge.style.background = "transparent"; estadoBadge.style.border = "1px dashed var(--line)"; estadoBadge.style.color = "var(--muted)";
        estadoBadge.textContent = "Por cobrar";
      }
      mid.appendChild(estadoBadge);
      // Indicador de anticipo (discreto)
      if(tieneAnticipo(c)){
        mid.appendChild(el("span",{style:{display:"inline-block",marginTop:"5px",marginLeft:"6px",fontSize:"11px",fontWeight:"500",padding:"2px 9px",borderRadius:"9999px",background:"var(--accentSoft)",color:"var(--accent)"}},
          nombreAntL+" "+eur(anticipoDe(c))));
      }
      main.appendChild(mid);
      const right = el("span",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",paddingTop:"2px"}});
      if(precio>0) right.appendChild(el("span",{class:"tabnum",style:{fontSize:"14px",fontWeight:"600"}}, eur(precio)));
      // Si tiene anticipo y no está cobrada ni es no-show, mostrar lo pendiente
      if(tieneAnticipo(c) && !pagoOn && !esNoAsistio){
        right.appendChild(el("span",{class:"tabnum",style:{fontSize:"11px",color:"var(--muted)"}}, "Falta "+eur(pendienteCita(c))));
      }
      if(c.propina>0) right.appendChild(el("span",{class:"tabnum",style:{fontSize:"11px",color:"var(--accent)"}}, "+"+eur(c.propina)+" prop."));
      right.appendChild(el("span",{style:{marginTop:"4px",color:"var(--muted)"}}, icon("pencil",14)));
      main.appendChild(right);
      card.appendChild(main);
      // botón eliminar directo
      card.appendChild(el("button",{"aria-label":"Eliminar cita",
        style:{flexShrink:"0",alignSelf:"center",height:"38px",width:"38px",display:"grid",placeItems:"center",borderRadius:"10px",background:"#F4E6E4",color:"var(--danger)"},
        onClick:(e)=>{
          e.stopPropagation();
          confirmar("¿Eliminar la cita de "+(c.clienta||"esta clienta")+" a las "+formatHora12(c.hora)+"?", ()=>{
            const arr = (state.citas[selectedKey]||[]).filter(x=>x.id!==c.id);
            state.citas = Object.assign({}, state.citas);
            if(arr.length) state.citas[selectedKey]=arr; else delete state.citas[selectedKey];
            save(); render(); toast("Cita eliminada");
          });
        }
      }, icon("trash",16)));
      list.appendChild(card);
    });
  }
  wrap.appendChild(list);

  // botón flotante
  const fab = el("button",{class:"fab", onClick:()=>openCita(selectedKey,null)}, icon("plus",20), "Añadir cita");
  wrap.appendChild(fab);
  const fabBackup = el("button",{class:"fab-backup","aria-label":"Hacer copia de seguridad ahora", onClick:exportar}, icon("download",18));
  wrap.appendChild(fabBackup);

  return wrap;
}

/* ============ overlay ============ */
function closeOverlays(){ document.querySelectorAll(".overlay").forEach(o=>o.remove()); }
function buildSheet(){
  const overlay = el("div",{class:"overlay", onClick:closeOverlays});
  const sheet = el("div",{class:"sheet", onClick:(e)=>e.stopPropagation()});
  overlay.appendChild(sheet);
  return { overlay, sheet };
}
function confirmar(mensaje, onSi, textoSi){
  const overlay = el("div",{class:"overlay", onClick:(e)=>{ if(e.target===overlay) overlay.remove(); }});
  const sheet = el("div",{class:"sheet", onClick:(e)=>e.stopPropagation()});
  overlay.appendChild(sheet);
  sheet.appendChild(el("p",{style:{fontSize:"15px",lineHeight:"1.4",margin:"0 0 20px"}}, mensaje));
  sheet.appendChild(el("div",{style:{display:"flex",gap:"8px"}},
    el("button",{style:{flex:"1",height:"48px",borderRadius:"12px",background:"var(--bg)",border:"1px solid var(--line)",color:"var(--ink)",fontWeight:"500"},
      onClick:()=>overlay.remove()}, "Cancelar"),
    el("button",{style:{flex:"1",height:"48px",borderRadius:"12px",background:"var(--danger)",color:"#fff",fontWeight:"500"},
      onClick:()=>{ overlay.remove(); onSi(); }}, textoSi||"Eliminar")
  ));
  document.body.appendChild(overlay);
}

/* ============ modal cita ============ */
function openCita(dateKey, cita, draft){
  closeOverlays();
  const initial = draft || cita || {};
  let sel = (initial.servicios||[]).slice();
  const { overlay, sheet } = buildSheet();

  const head = el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"2px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}}, cita?"Editar cita":"Nueva cita"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  );
  sheet.appendChild(head);
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 16px",color:"var(--muted)"}}, cap(fmtDiaLargo(fromKey(dateKey)))));

  let horaSel = initial.hora || state.horarios[0];
  const horaChips = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  function renderHoraChips(){
    horaChips.innerHTML = "";
    const ocupados = slotsOcupados(dateKey, cita && cita.id);
    const opciones = state.horarios.slice();
    if(horaSel && opciones.indexOf(horaSel)<0) opciones.push(horaSel); // conserva una hora antigua que ya no esté en la lista
    opciones.forEach(h=>{
      const on = horaSel===h;
      const ocupado = !!ocupados[h] && h!==horaSel;
      const chip = el("button",{type:"button", class:"chip"+(on?" chip-on":""),
        style: ocupado ? {opacity:".5"} : {},
        onClick:()=>{ horaSel=h; renderHoraChips(); }});
      if(on) chip.appendChild(icon("check",14));
      chip.appendChild(document.createTextNode(formatHora12(h)+(ocupado?" (ocupado)":"")));
      horaChips.appendChild(chip);
    });
  }
  renderHoraChips();
  const horaHint = el("p",{style:{fontSize:"11px",margin:"-4px 0 0",color:"var(--muted)"}},
    "Si una clienta tiene varios servicios largos, puede tapar el siguiente horario.");
  const clientaInput = el("input",{class:"field",placeholder:"Nombre de la clienta"});
  clientaInput.value = initial.clienta || "";
  const phoneInput = el("input",{class:"field",type:"text",placeholder:"Ej. 612 345 678"});
  phoneInput.value = draft ? (draft.telefono||"") : (cita ? (state.clientes[cita.clienta]||"") : "");
  const notasInput = el("textarea",{class:"field",rows:"2",placeholder:"Color, detalles…"});
  notasInput.value = initial.notas || "";

  const chips = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  const totalLine = el("p",{style:{fontSize:"14px",margin:"8px 0 0",fontWeight:"600",color:"var(--accent)"}});
  function cantidadDe(nombre){ return sel.filter(n=>n===nombre).length; }
  function setCantidad(nombre, n){
    sel = sel.filter(x=>x!==nombre);
    for(let i=0;i<n;i++) sel.push(nombre);
  }
  let _onServiciosChange = null;
  function renderChips(){
    chips.innerHTML="";
    state.servicios.forEach(s=>{
      const qty = cantidadDe(s.nombre);
      const on = qty>0;
      const chip = el("div",{class:"chip"+(on?" chip-on":"")});
      const label = el("button",{type:"button",
        style:{display:"flex",alignItems:"center",gap:"6px",background:"none",border:"none",color:"inherit",font:"inherit",padding:"0"},
        onClick:()=>{ if(qty===0){ setCantidad(s.nombre,1); renderChips(); } }
      });
      if(on) label.appendChild(icon("check",14));
      label.appendChild(document.createTextNode(s.nombre));
      if(typeof s.precio==="number") label.appendChild(el("span",{class:"chip-price"}," · "+eur(s.precio)));
      chip.appendChild(label);
      if(on){
        chip.appendChild(el("span",{style:{display:"flex",alignItems:"center",gap:"4px",marginLeft:"4px"}},
          el("button",{type:"button","aria-label":"Quitar una "+s.nombre,
            style:{width:"22px",height:"22px",display:"grid",placeItems:"center",borderRadius:"9999px",background:"rgba(255,255,255,.35)"},
            onClick:()=>{ setCantidad(s.nombre, Math.max(0,qty-1)); renderChips(); }}, "–"),
          el("span",{class:"tabnum",style:{minWidth:"14px",textAlign:"center",fontSize:"13px"}}, String(qty)),
          el("button",{type:"button","aria-label":"Añadir una "+s.nombre,
            style:{width:"22px",height:"22px",display:"grid",placeItems:"center",borderRadius:"9999px",background:"rgba(255,255,255,.35)"},
            onClick:()=>{ setCantidad(s.nombre, qty+1); renderChips(); }}, "+")
        ));
      }
      chips.appendChild(chip);
    });
    const total = sel.reduce((t,n)=>t+precioDe(n),0);
    totalLine.textContent = total>0 ? "Total: "+eur(total) : "";
    if(typeof _onServiciosChange==="function") _onServiciosChange();
  }
  renderChips();

  let pagoSel = initial.pago || "";
  function getPAGO_OPCIONES(){
    return state.formasPago.map(f=>[f.id, f.nombre]);
  }
  const pagoChips = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  function renderPagoChips(){
    pagoChips.innerHTML="";
    getPAGO_OPCIONES().forEach(([val,label])=>{
      const on = pagoSel===val;
      const chip = el("button",{class:"chip"+(on?" chip-on":""), onClick:()=>{ pagoSel=val; renderPagoChips(); }});
      if(on) chip.appendChild(icon("check",14));
      chip.appendChild(document.createTextNode(label));
      pagoChips.appendChild(chip);
    });
  }
  renderPagoChips();

  let propinaOn = !!(initial.propina && initial.propina>0);
  const propinaInput = el("input",{class:"field",type:"number",step:"0.5",min:"0",inputmode:"decimal",placeholder:"0.00",
    style:{marginTop:"8px", display: propinaOn ? "block":"none"}});
  propinaInput.value = initial.propina ? initial.propina : "";
  const propinaToggle = el("button",{type:"button", class:"chip"+(propinaOn?" chip-on":"")});
  function renderPropinaToggle(){
    propinaToggle.className = "chip"+(propinaOn?" chip-on":"");
    propinaToggle.innerHTML = "";
    if(propinaOn) propinaToggle.appendChild(icon("check",14));
    propinaToggle.appendChild(document.createTextNode("La clienta dejó propina"));
    propinaInput.style.display = propinaOn ? "block" : "none";
  }
  propinaToggle.addEventListener("click", ()=>{
    propinaOn = !propinaOn;
    if(!propinaOn) propinaInput.value="";
    renderPropinaToggle();
    if(propinaOn) propinaInput.focus();
  });
  renderPropinaToggle();

  /* ===== ANTICIPO / FIANZA (opcional) ===== */
  const nombreAnt = state.nombreAnticipo || "Anticipo";
  let anticipoOn = tieneAnticipo(initial);
  let anticipoMetodo = (initial.anticipo && initial.anticipo.metodo) ? initial.anticipo.metodo : "";
  let estadoNoAsistio = noAsistio(initial);

  const anticipoImporteInput = el("input",{class:"field",type:"number",step:"0.5",min:"0",inputmode:"decimal",placeholder:"0.00",
    style:{marginTop:"8px"}});
  anticipoImporteInput.value = (initial.anticipo && initial.anticipo.importe) ? initial.anticipo.importe : "";

  // Selector de método del anticipo (usa las mismas formas de pago, excepto "Pendiente")
  const anticipoMetodoChips = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"8px"}});
  function renderAnticipoMetodo(){
    anticipoMetodoChips.innerHTML="";
    state.formasPago.filter(f=>f.id!=="pendiente").forEach(f=>{
      const on = anticipoMetodo===f.id;
      const chip = el("button",{type:"button", class:"chip"+(on?" chip-on":""), onClick:()=>{ anticipoMetodo=f.id; renderAnticipoMetodo(); }});
      if(on) chip.appendChild(icon("check",14));
      chip.appendChild(document.createTextNode(f.nombre));
      anticipoMetodoChips.appendChild(chip);
    });
  }
  renderAnticipoMetodo();

  // Resumen de cálculo: Total / Anticipo / Pendiente
  const anticipoResumen = el("div",{style:{marginTop:"10px",padding:"10px 12px",borderRadius:"12px",background:"var(--accentSoft)",fontSize:"13px",lineHeight:"1.7"}});
  function renderAnticipoResumen(){
    const total = sel.reduce((t,n)=>t+precioDe(n),0);
    const ant = parseFloat(anticipoImporteInput.value)||0;
    const pend = Math.max(0, total-ant);
    anticipoResumen.innerHTML="";
    anticipoResumen.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between"}}, el("span",{},"Total del servicio"), el("strong",{class:"tabnum"}, eur(total))));
    anticipoResumen.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between"}}, el("span",{}, nombreAnt+" recibido"), el("strong",{class:"tabnum"}, eur(ant))));
    anticipoResumen.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",color:"var(--accent)"}}, el("span",{},"Pendiente el día de la cita"), el("strong",{class:"tabnum"}, eur(pend))));
  }
  anticipoImporteInput.addEventListener("input", renderAnticipoResumen);

  const anticipoDetalle = el("div",{style:{display: anticipoOn ? "block":"none"}},
    el("label",{class:"label",style:{marginTop:"4px"}}, "Importe del "+nombreAnt.toLowerCase()),
    anticipoImporteInput,
    el("label",{class:"label",style:{marginTop:"8px"}}, "Método de pago del "+nombreAnt.toLowerCase()),
    anticipoMetodoChips,
    anticipoResumen
  );

  const anticipoToggle = el("button",{type:"button", class:"chip"+(anticipoOn?" chip-on":"")});
  function renderAnticipoToggle(){
    anticipoToggle.className = "chip"+(anticipoOn?" chip-on":"");
    anticipoToggle.innerHTML = "";
    if(anticipoOn) anticipoToggle.appendChild(icon("check",14));
    anticipoToggle.appendChild(document.createTextNode("Esta cita tiene "+nombreAnt.toLowerCase()));
    anticipoDetalle.style.display = anticipoOn ? "block" : "none";
  }
  anticipoToggle.addEventListener("click", ()=>{
    anticipoOn = !anticipoOn;
    if(!anticipoOn){ anticipoImporteInput.value=""; anticipoMetodo=""; renderAnticipoMetodo(); }
    else { if(!anticipoMetodo){ const primera = state.formasPago.find(f=>f.id!=="pendiente"); if(primera){ anticipoMetodo=primera.id; renderAnticipoMetodo(); } } }
    renderAnticipoToggle();
    renderAnticipoResumen();
    if(anticipoOn) anticipoImporteInput.focus();
  });
  renderAnticipoToggle();
  renderAnticipoResumen();

  // Estado "No asistió" (solo relevante al editar una cita existente con anticipo)
  const noAsistioToggle = el("button",{type:"button", class:"chip"+(estadoNoAsistio?" chip-on":"")});
  function renderNoAsistioToggle(){
    noAsistioToggle.className = "chip"+(estadoNoAsistio?" chip-on":"");
    noAsistioToggle.innerHTML = "";
    if(estadoNoAsistio) noAsistioToggle.appendChild(icon("check",14));
    noAsistioToggle.appendChild(document.createTextNode("La clienta no asistió"));
  }
  noAsistioToggle.addEventListener("click", ()=>{
    estadoNoAsistio = !estadoNoAsistio;
    renderNoAsistioToggle();
  });
  renderNoAsistioToggle();
  const noAsistioWrap = el("div",{},
    noAsistioToggle,
    el("p",{style:{fontSize:"11px",margin:"6px 0 0",color:"var(--muted)"}},
      "Si la marcas, solo se contará el "+nombreAnt.toLowerCase()+" retenido como ingreso.")
  );
  // Recalcula el resumen del anticipo cada vez que cambian los servicios
  _onServiciosChange = function(){ if(typeof renderAnticipoResumen==="function") renderAnticipoResumen(); };

  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"0"}});

  const pillBtnStyle = {display:"inline-flex",alignItems:"center",gap:"6px",fontSize:"13px",padding:"7px 14px",
    borderRadius:"9999px",background:"var(--paper)",border:"1px solid var(--line)",color:"var(--ink)"};
  const accionesClienta = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"8px"}});
  if(contactsSupported()){
    accionesClienta.appendChild(el("button",{type:"button", style:pillBtnStyle,
      onClick: async ()=>{
        const picked = await pickContact();
        if(picked){
          if(picked.nombre) clientaInput.value = picked.nombre;
          if(picked.tel) phoneInput.value = picked.tel;
          err.textContent=""; renderPhoneActions();
        } else toast("No se pudo importar el contacto");
      }
    }, icon("upload",14), "Importar de contactos"));
  }
  accionesClienta.appendChild(el("button",{type:"button", style:pillBtnStyle,
    onClick:()=>{
      const snapshot = { hora:horaSel, clienta:clientaInput.value, telefono:phoneInput.value,
        servicios:sel.slice(), notas:notasInput.value, pago:pagoSel, propina: propinaOn ? (parseFloat(propinaInput.value)||0) : 0,
        anticipo: anticipoOn ? { activo:true, importe:(parseFloat(anticipoImporteInput.value)||0), metodo:anticipoMetodo } : null,
        estado: estadoNoAsistio ? "no_asistio" : null };
      openClientesView({
        onSelect:(nombre, tel)=>{ snapshot.clienta=nombre; snapshot.telefono=tel||""; openCita(dateKey, cita, snapshot); },
        onCancel:()=> openCita(dateKey, cita, snapshot)
      });
    }
  }, icon("users",14), "Elegir clienta guardada"));

  clientaInput.addEventListener("input", ()=>{ err.textContent=""; });
  clientaInput.addEventListener("blur", ()=>{
    const n = clientaInput.value.trim();
    if(n && state.clientes[n] && !phoneInput.value.trim()){ phoneInput.value = state.clientes[n]; renderPhoneActions(); }
  });

  const phoneActions = el("div",{style:{display:"flex",gap:"8px",marginTop:"8px"}});
  function renderPhoneActions(){
    phoneActions.innerHTML = "";
    const digits = (phoneInput.value||"").replace(/\D/g,"");
    if(!digits) return;
    const intl = digits.length===9 ? "34"+digits : digits;
    const pillStyle = {display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",padding:"7px 14px",
      borderRadius:"9999px",background:"var(--paper)",border:"1px solid var(--line)",color:"var(--ink)",textDecoration:"none"};
    phoneActions.appendChild(el("a",{href:"tel:"+digits, style:pillStyle}, icon("phone",14), "Llamar"));
    phoneActions.appendChild(el("a",{href:"https://wa.me/"+intl, target:"_blank", rel:"noopener", style:pillStyle}, icon("message-circle",14), "WhatsApp"));
  }
  renderPhoneActions();
  phoneInput.addEventListener("input", renderPhoneActions);

  const body = el("div",{style:{display:"flex",flexDirection:"column",gap:"14px"}},
    el("div",{}, el("label",{class:"label"},"Hora"), horaChips, horaHint),
    el("div",{}, el("label",{class:"label"},"Clienta"), clientaInput, accionesClienta),
    el("div",{}, el("label",{class:"label"},"Teléfono (opcional)"), phoneInput, phoneActions),
    el("div",{}, el("label",{class:"label"},"Servicios (puedes elegir varios)"), chips, totalLine),
    el("div",{}, el("label",{class:"label"},"Cobro"), pagoChips),
    el("div",{}, el("label",{class:"label"},"Propina (opcional)"), propinaToggle, propinaInput),
    el("div",{}, el("label",{class:"label"}, nombreAnt+" (opcional)"), anticipoToggle, anticipoDetalle),
    (cita ? el("div",{}, el("label",{class:"label"},"Asistencia"), noAsistioWrap) : el("span",{style:{display:"none"}})),
    el("div",{}, el("label",{class:"label"},"Notas (opcional)"), notasInput),
    err
  );
  sheet.appendChild(body);

  function guardar(){
    if(!clientaInput.value.trim()){ err.textContent="Escribe el nombre de la clienta."; return; }
    const nombreClienta = clientaInput.value.trim();
    // Construir objeto anticipo si está activo y tiene importe válido
    let anticipoObj = null;
    if(anticipoOn){
      const imp = parseFloat(anticipoImporteInput.value)||0;
      if(imp>0){
        let met = anticipoMetodo;
        if(!met){ const primera = state.formasPago.find(f=>f.id!=="pendiente"); met = primera ? primera.id : ""; }
        anticipoObj = { activo:true, importe:imp, metodo:met };
      }
    }
    const obj = {
      id: (cita && cita.id) ? cita.id : (Date.now()+"-"+Math.random().toString(36).slice(2,7)),
      hora: horaSel, clienta: nombreClienta,
      servicios: sel, notas: notasInput.value.trim(), pago: pagoSel || null,
      propina: propinaOn ? (parseFloat(propinaInput.value)||0) : 0,
      anticipo: anticipoObj,
      estado: estadoNoAsistio ? "no_asistio" : null
    };
    const arr = state.citas[dateKey] ? state.citas[dateKey].slice() : [];
    if(cita && cita.id){
      const i = arr.findIndex(x=>x.id===cita.id);
      if(i>=0) arr[i]=obj; else arr.push(obj);
    } else arr.push(obj);
    state.citas = Object.assign({}, state.citas); state.citas[dateKey]=arr;
    const tel = phoneInput.value.trim();
    state.clientes = Object.assign({}, state.clientes);
    state.clientes[nombreClienta] = tel || state.clientes[nombreClienta] || "";
    save(); closeOverlays(); render(); toast("Cita guardada");
  }
  function borrar(){
    const arr = (state.citas[dateKey]||[]).filter(x=>x.id!==cita.id);
    const nc = Object.assign({}, state.citas);
    if(arr.length) nc[dateKey]=arr; else delete nc[dateKey];
    state.citas = nc; save(); closeOverlays(); render(); toast("Cita eliminada");
  }

  const actions = el("div",{style:{display:"flex",gap:"8px",marginTop:"20px"}});
  if(cita){
    actions.appendChild(el("button",{"aria-label":"Eliminar cita",
      style:{height:"48px",width:"48px",display:"grid",placeItems:"center",borderRadius:"12px",flexShrink:"0",background:"#F4E6E4",color:"var(--danger)"},
      onClick:borrar}, icon("trash",18)));
  }
  actions.appendChild(el("button",{class:"primary",style:{flex:"1",height:"48px"}, onClick:guardar},"Guardar"));
  sheet.appendChild(actions);

  document.body.appendChild(overlay);
  setTimeout(()=>{ if(!cita) clientaInput.focus(); }, 50);
}

/* ============ configuración del negocio (nombre, color, horarios) ============ */
function openConfiguracionNegocio(forzado){
  closeOverlays();
  const temaOriginal = state.tema;
  function cancelar(){ aplicarTema(temaOriginal); closeOverlays(); }

  const overlay = el("div",{class:"overlay"});
  if(!forzado) overlay.addEventListener("click", cancelar);
  const sheet = el("div",{class:"sheet", onClick:(e)=>e.stopPropagation()});
  overlay.appendChild(sheet);

  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}}, forzado ? "Bienvenida" : "Configurar negocio"),
    forzado ? el("span",{}) : el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:cancelar}, icon("x",20))
  ));
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 18px",color:"var(--muted)"}},
    forzado ? "Vamos a dejar la app lista en un minuto. Solo se hace una vez." : "Cambia el nombre, los colores, los horarios o tus servicios cuando quieras."));

  // nombre
  const nombreInput = el("input",{class:"field",placeholder:"Ej. Kukys Nails"});
  nombreInput.value = (state.configurado ? state.negocio : "") || "";
  sheet.appendChild(el("div",{style:{marginBottom:"18px"}}, el("label",{class:"label"},"Nombre del negocio"), nombreInput));

  // logo
  let logoData = state.logo || null;
  const logoPreview = el("div",{style:{height:"56px",width:"56px",borderRadius:"12px",flexShrink:"0",
    border:"1px solid var(--line)",background:"var(--paper)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}});
  function renderLogo(){
    logoPreview.innerHTML = "";
    if(logoData) logoPreview.appendChild(el("img",{src:logoData,style:{width:"100%",height:"100%",objectFit:"cover"}}));
    else logoPreview.appendChild(el("span",{style:{color:"var(--muted)"}}, icon("users",20)));
  }
  renderLogo();
  const logoFile = el("input",{type:"file",accept:"image/*",style:{display:"none"}});
  logoFile.addEventListener("change", (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        // reescalar a máx 256px para no inflar el almacenamiento
        const max=256; let w=img.width,h=img.height;
        if(w>h && w>max){ h=h*max/w; w=max; } else if(h>max){ w=w*max/h; h=max; }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        logoData = c.toDataURL("image/png");
        renderLogo();
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(f);
    e.target.value="";
  });
  sheet.appendChild(el("div",{style:{marginBottom:"18px"}},
    el("label",{class:"label"},"Logo (opcional)"),
    el("div",{style:{display:"flex",alignItems:"center",gap:"12px"}},
      logoPreview,
      el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap"}},
        el("button",{type:"button",class:"chip", onClick:()=>logoFile.click()}, icon("upload",14), "Subir"),
        el("button",{type:"button",class:"chip", onClick:()=>{ logoData=null; renderLogo(); }}, "Quitar")
      )
    ),
    logoFile
  ));

  // color
  let temaSel = state.tema || "rosado";
  const temaWrap = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"10px"}});
  function renderTemas(){
    temaWrap.innerHTML = "";
    Object.keys(TEMAS).forEach(key=>{
      const t = TEMAS[key];
      const on = temaSel===key;
      temaWrap.appendChild(el("button",{type:"button",
        style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 14px",borderRadius:"9999px",
          border:"1px solid "+(on?t.accent:t.line), background:t.paper, color:t.ink, fontSize:"13px",fontWeight: on?"600":"400"},
        onClick:()=>{ temaSel=key; renderTemas(); aplicarTema(key); }
      },
        el("span",{style:{height:"16px",width:"16px",borderRadius:"9999px",background:t.accent,display:"inline-block",flexShrink:"0"}}),
        t.nombre
      ));
    });
  }
  renderTemas();
  sheet.appendChild(el("div",{style:{marginBottom:"18px"}}, el("label",{class:"label"},"Color"), temaWrap));

  // horarios
  let horariosSel = (state.horarios && state.horarios.length ? state.horarios : HORARIOS_DEFAULT).slice();
  const horaNuevaInput = el("input",{class:"field",type:"time",style:{width:"120px"}});
  const horariosWrap = el("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});
  function renderHorariosCfg(){
    horariosWrap.innerHTML = "";
    horariosSel.slice().sort().forEach(h=>{
      horariosWrap.appendChild(el("span",{class:"chip chip-on"},
        formatHora12(h),
        el("button",{type:"button","aria-label":"Quitar "+h, style:{marginLeft:"2px",display:"flex",color:"#fff"},
          onClick:()=>{ horariosSel = horariosSel.filter(x=>x!==h); renderHorariosCfg(); }}, icon("x",12))
      ));
    });
  }
  renderHorariosCfg();
  function añadirHorario(){
    const v = horaNuevaInput.value;
    if(v && horariosSel.indexOf(v)<0){ horariosSel.push(v); renderHorariosCfg(); }
    horaNuevaInput.value = "";
  }
  horaNuevaInput.addEventListener("keydown", e=>{ if(e.key==="Enter") añadirHorario(); });
  sheet.appendChild(el("div",{style:{marginBottom:"6px"}},
    el("label",{class:"label"},"Horarios fijos de trabajo"),
    horariosWrap,
    el("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}},
      horaNuevaInput,
      el("button",{class:"primary","aria-label":"Añadir horario",style:{height:"40px",width:"40px",display:"grid",placeItems:"center",flexShrink:"0"},
        onClick:añadirHorario}, icon("plus",16))
    )
  ));
  sheet.appendChild(el("p",{style:{fontSize:"11px",margin:"0 0 18px",color:"var(--muted)"}},
    "Los únicos horarios que se podrán elegir al crear una cita, y los que se comparten en Disponibilidad."));

  // servicios y precios
  let serviciosSel = state.servicios.map(s=>Object.assign({},s));
  const servWrap = el("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}});
  function renderServiciosCfg(){
    servWrap.innerHTML = "";
    serviciosSel.forEach((s,idx)=>{
      servWrap.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"6px",background:"#fff",border:"1px solid var(--line)",borderRadius:"12px",padding:"8px 12px"}},
        el("span",{class:"truncate",style:{flex:"1",minWidth:"0",fontSize:"14px"}}, s.nombre),
        el("span",{class:"tabnum",style:{fontSize:"13px",color:"var(--muted)"}}, (typeof s.precio==="number"? eur(s.precio):"—")),
        el("button",{type:"button","aria-label":"Quitar "+s.nombre,style:{padding:"4px",color:"var(--muted)"},
          onClick:()=>{ serviciosSel.splice(idx,1); renderServiciosCfg(); }}, icon("x",16))
      ));
    });
  }
  renderServiciosCfg();
  const servNombre = el("input",{class:"field",placeholder:"Servicio…",style:{flex:"1",minWidth:"0",fontSize:"14px"}});
  const servPrecio = el("input",{class:"field",inputmode:"decimal",placeholder:"€",style:{width:"56px",textAlign:"center",fontSize:"14px"}});
  const servDur = el("input",{class:"field",inputmode:"numeric",placeholder:"min",style:{width:"56px",textAlign:"center",fontSize:"14px"}});
  const servCfgErr = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"6px 0 0"}});
  function añadirServicio(){
    const n = servNombre.value.trim();
    if(!n){ servCfgErr.textContent="Escribe el nombre del servicio."; return; }
    if(serviciosSel.some(x=>normTxt(x.nombre)===normTxt(n))){ servCfgErr.textContent="Ya tienes un servicio con ese nombre."; return; }
    servCfgErr.textContent="";
    const pv = servPrecio.value.trim().replace(",","."); const p = pv===""?null:Number(pv);
    const dv = parseInt(servDur.value,10); const d = Number.isFinite(dv)&&dv>0?dv:60;
    serviciosSel.push({nombre:n, precio:Number.isFinite(p)?p:null, duracion:d});
    servNombre.value=""; servPrecio.value=""; servDur.value="";
    renderServiciosCfg();
  }
  servNombre.addEventListener("keydown",e=>{ if(e.key==="Enter") añadirServicio(); });
  sheet.appendChild(el("div",{style:{marginBottom:"6px"}},
    el("label",{class:"label"},"Servicios y precios"),
    servWrap,
    el("div",{style:{display:"flex",gap:"8px",marginTop:"10px"}},
      servNombre, servPrecio, servDur,
      el("button",{class:"primary","aria-label":"Añadir servicio",style:{height:"40px",width:"40px",display:"grid",placeItems:"center",flexShrink:"0"},
        onClick:añadirServicio}, icon("plus",16))
    ),
    servCfgErr
  ));
  sheet.appendChild(el("p",{style:{fontSize:"11px",margin:"0 0 18px",color:"var(--muted)"}},
    "El precio y los minutos son opcionales, pero los minutos ayudan a calcular los huecos libres."));

  // pie personalizado
  const pieInput = el("input",{class:"field",placeholder:"Ej. WhatsApp: 644 000 000"});
  pieInput.value = state.piePersonalizado || "";
  sheet.appendChild(el("div",{style:{marginBottom:"18px"}},
    el("label",{class:"label"},"Pie para la imagen de disponibilidad (opcional)"), pieInput));

  // premio de fidelidad
  let fidelidadOn = state.fidelidadActiva===true;
  let fidMeses = (typeof state.fidelidadMeses==="number" && state.fidelidadMeses>=2) ? state.fidelidadMeses : 5;
  const fidExtra = el("div",{style:{display: fidelidadOn?"block":"none", marginTop:"10px"}});
  const fidToggle = el("button",{type:"button"});
  function renderFidToggle(){
    fidToggle.className = "chip"+(fidelidadOn?" chip-on":"");
    fidToggle.innerHTML = "";
    if(fidelidadOn) fidToggle.appendChild(icon("check",14));
    fidToggle.appendChild(document.createTextNode("Activar premio de fidelidad"));
    fidExtra.style.display = fidelidadOn ? "block" : "none";
  }
  fidToggle.addEventListener("click", ()=>{ fidelidadOn=!fidelidadOn; renderFidToggle(); });

    el("span",{style:{fontSize:"13px",color:"var(--muted)"}},"Tras"), fidMesesInput,
    el("span",{style:{fontSize:"13px",color:"var(--muted)"}},"meses seguidos viniendo")));
  fidExtra.appendChild(el("div",{}, el("label",{class:"label"},"Recompensa que ofreces"), fidPremioInput));

  sheet.appendChild(el("div",{style:{marginBottom:"18px"}},
    el("label",{class:"label"},"Fidelización (opcional)"),
    fidToggle,
    fidExtra,
    el("p",{style:{fontSize:"11px",margin:"8px 0 0",color:"var(--muted)"}},
      "Si lo activas, la app te avisará en la ficha de una clienta cuando lleve esos meses seguidos viniendo, para que decidas si le das el premio.")
  ));

  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"0 0 10px"}});
  sheet.appendChild(err);

  function guardar(){
    const nombre = nombreInput.value.trim();
    if(!nombre){ err.textContent="Escribe el nombre del negocio."; return; }
    if(horariosSel.length===0){ err.textContent="Añade al menos un horario."; return; }
    if(serviciosSel.length===0){ err.textContent="Añade al menos un servicio."; return; }
    state.negocio = nombre;
    state.tema = temaSel;
    state.horarios = horariosSel.slice().sort();
    state.servicios = normServicios(serviciosSel);
    state.logo = logoData;
    state.piePersonalizado = pieInput.value.trim();
    state.fidelidadActiva = fidelidadOn;
    const mv = parseInt(fidMesesInput.value,10);
    state.fidelidadMeses = (Number.isFinite(mv) && mv>=2) ? mv : 5;
    state.fidelidadPremio = fidPremioInput.value.trim() || "un diseño gratis";
    state.configurado = true;
    save();
    aplicarTema(temaSel);
    aplicarNombreNegocio(nombre);
    closeOverlays();
    render();
    toast(forzado ? "Todo listo. ¡A trabajar!" : "Configuración guardada");
  }
  sheet.appendChild(el("button",{class:"primary",style:{width:"100%",height:"48px"}, onClick:guardar},
    forzado ? "Guardar y empezar" : "Guardar"));

  document.body.appendChild(overlay);
}

/* ============ crear / cambiar PIN ============ */
function openConfigurarPin(){
  closeOverlays();
  const { overlay, sheet } = buildSheet();
  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"4px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}}, pinActivo() ? "Cambiar PIN" : "Crear PIN"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));
  sheet.appendChild(el("p",{style:{fontSize:"12px",margin:"0 0 16px",color:"var(--muted)"}},
    "Te lo pedirá cada vez que abras la app. Si lo olvidas, solo se puede borrar y crear uno nuevo — no hay forma de recuperarlo."));

  let largo = 4;
  const largoWrap = el("div",{style:{display:"flex",gap:"8px",marginBottom:"16px"}});
  function renderLargo(){
    largoWrap.innerHTML="";
    [4,6].forEach(n=>{
      const on = largo===n;
      largoWrap.appendChild(el("button",{type:"button",class:"chip"+(on?" chip-on":""), onClick:()=>{ largo=n; renderLargo(); }}, n+" dígitos"));
    });
  }
  renderLargo();
  sheet.appendChild(el("div",{style:{marginBottom:"16px"}}, el("label",{class:"label"},"Longitud"), largoWrap));

  const p1 = el("input",{class:"field",type:"password",inputmode:"numeric",maxlength:"6",placeholder:"Nuevo PIN"});
  const p2 = el("input",{class:"field",type:"password",inputmode:"numeric",maxlength:"6",placeholder:"Repite el PIN"});
  const err = el("p",{style:{fontSize:"12px",color:"var(--danger)",margin:"0"}});
  sheet.appendChild(el("div",{style:{display:"flex",flexDirection:"column",gap:"12px"}},
    el("div",{}, el("label",{class:"label"},"PIN"), p1),
    el("div",{}, el("label",{class:"label"},"Repite el PIN"), p2),
    err
  ));

  function guardar(){
    const a = p1.value.trim(), b = p2.value.trim();
    if(a.length!==largo || !/^\d+$/.test(a)){ err.textContent="El PIN debe tener exactamente "+largo+" números."; return; }
    if(a!==b){ err.textContent="Los dos PIN no coinciden."; return; }
    guardarPin(a).then(()=>{
      sessionStorage.setItem(PIN_SESSION_KEY,"1");
      closeOverlays(); toast("PIN activado"); render();
    });
  }
  sheet.appendChild(el("button",{class:"primary",style:{width:"100%",height:"48px",marginTop:"18px"}, onClick:guardar},
    pinActivo() ? "Cambiar PIN" : "Activar PIN"));

  document.body.appendChild(overlay);
}

function openSearch(){
  closeOverlays();
  const { overlay, sheet } = buildSheet();
  sheet.appendChild(el("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}},
    el("h3",{class:"serif",style:{fontSize:"20px",margin:"0"}},"Buscar"),
    el("button",{"aria-label":"Cerrar",style:{padding:"4px",color:"var(--muted)"}, onClick:closeOverlays}, icon("x",20))
  ));
  const input = el("input",{class:"field",placeholder:"Clienta o servicio…"});
  const results = el("div",{style:{display:"flex",flexDirection:"column",gap:"6px",marginTop:"10px"}});
  function renderResults(){
    results.innerHTML="";
    const q = input.value.trim().toLowerCase();
    if(!q) return;
    const out=[];
    for(const k in state.citas){
      state.citas[k].forEach(c=>{
        const enServ = (c.servicios||[]).some(s=>s.toLowerCase().indexOf(q)>=0);
        if((c.clienta||"").toLowerCase().indexOf(q)>=0 || enServ) out.push(Object.assign({dateKey:k},c));
      });
    }
    out.sort((a,b)=>(a.dateKey+a.hora).localeCompare(b.dateKey+b.hora));
    if(out.length===0){ results.appendChild(el("p",{style:{fontSize:"14px",padding:"0 4px",color:"var(--muted)"}},"Sin resultados.")); return; }
    out.forEach(c=>{
      results.appendChild(el("button",{style:{textAlign:"left",borderRadius:"12px",padding:"8px 12px",display:"flex",alignItems:"center",gap:"12px",background:"#fff",border:"1px solid var(--line)"},
        onClick:()=>{ closeOverlays(); irAAgenda(c.dateKey); }},
        el("span",{class:"tabnum",style:{fontSize:"12px",width:"58px",color:"var(--accent)"}}, formatHora12(c.hora)),
        el("span",{style:{flex:"1",minWidth:"0"}},
          el("span",{class:"truncate",style:{display:"block",fontSize:"14px",fontWeight:"500"}}, c.clienta),
          el("span",{class:"truncate",style:{display:"block",fontSize:"12px",color:"var(--muted)"}}, resumenServicios(c.servicios)+" · "+cap(fmtDiaLargo(fromKey(c.dateKey))))
        )
      ));
    });
  }
  input.addEventListener("input", renderResults);
  sheet.appendChild(input);
  sheet.appendChild(results);
  document.body.appendChild(overlay);
  setTimeout(()=>input.focus(), 50);
}

/* ============ ventana de clientas (separada de la cita) ============ */
function sincronizarClientesDesdeCitas(){
  const nuevo = Object.assign({}, state.clientes);
  let añadidos = 0;
  for(const k in state.citas){
    state.citas[k].forEach(c=>{
      if(c.clienta && !(c.clienta in nuevo)){ nuevo[c.clienta] = ""; añadidos++; }
    });
  }
  state.clientes = nuevo;
  save();
  return añadidos;
}
